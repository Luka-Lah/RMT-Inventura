/* zbere vse dogodke po datumih: izposoje, roki vrnitve, zamude, datumski stolpci */
function buildCalEvents(){
  const map = {};
  const add = (iso, ev) => { if(!iso) return; (map[iso] = map[iso] || []).push(ev); };
  for(const i of inventory){
    for(const l of (i.loans||[])){
      add(l.from,  { type:'borrow', full:'Izposoja: ' + l.qty + ' × ' + i.name + ' (' + i.id + ') — ' + whoText(l) + ', vrnitev do ' + fmtDate(l.until), code:i.id });
      add(l.until, { type:isOverdue(l)?'overdue':'due', full:'Rok vrnitve: ' + l.qty + ' × ' + i.name + ' (' + i.id + ') — ' + whoText(l) + (isOverdue(l)?' — ZAMUDA':''), code:i.id });
    }
    for(const f of catFields(i.cat)){       // vsak datumski stolpec se pojavi na koledarju
      if(f.type !== 'date') continue;
      const v = i.custom ? i.custom[f.id] : '';
      if(v) add(v, { type:'popis', full:f.name + ': ' + i.name + ' (' + i.id + ')', code:i.id });
    }
  }
  return map;
}
const EV_ORDER = { overdue:0, due:1, borrow:2, popis:3 };
const EV_LABEL = { borrow:'Izposoja', due:'Vrnitev', overdue:'Zamuda', popis:'Popis' };

function toggleCalPop(){
  const p = el('calPop');
  const on = p.classList.toggle('on');
  if(on){ calSelDay = null; renderCalPop(); }
}
function closeCalPop(){ el('calPop').classList.remove('on'); }

function renderCalPop(){
  const now = new Date();
  if(calY===null){ calY = now.getFullYear(); calM = now.getMonth(); }
  const events = buildCalEvents();
  const startDow = (new Date(calY, calM, 1).getDay() + 6) % 7;   // ponedeljek = 0
  const daysInMonth = new Date(calY, calM+1, 0).getDate();
  const tIso = todayISO();

  let h = '';
  /* levi panel z dogodki izbranega dne */
  if(calSelDay){
    const evs = (events[calSelDay] || []).slice()
      .sort((a,b)=>(EV_ORDER[a.type]??9)-(EV_ORDER[b.type]??9));
    h += '<div class="calpop-side">' +
      '<div class="calpop-day-h"><b>' + fmtDate(calSelDay) + '</b>' +
        '<button class="calpop-x" data-act="calDayClose" aria-label="Zapri dan">×</button></div>';
    if(!evs.length){
      h += '<div style="font-size:12.5px;color:var(--ink-soft)">Na ta dan ni dogodkov.</div>';
    } else {
      for(const e of evs){
        h += '<div class="calpop-evt">' +
          '<span class="cal-evt ev-' + e.type + '">' + EV_LABEL[e.type] + '</span>' +
          '<span class="calpop-evt-t">' + esc(e.full) +
            ' <a data-act="calItem" data-id="' + esc(e.code) + '">Predmet ›</a></span>' +
        '</div>';
      }
    }
    h += '</div>';
  }

  /* glavni del: glava z izbiro meseca/leta, mreža, legenda */
  let mSel = '<select class="calsel" data-change="calMonth" aria-label="Mesec">';
  MONTH_NAMES.forEach((m,i)=>{ mSel += '<option value="' + i + '"' + (i===calM?' selected':'') + '>' + m + '</option>'; });
  mSel += '</select>';
  let ySel = '<select class="calsel" data-change="calYear" aria-label="Leto">';
  for(let y = now.getFullYear()-6; y <= now.getFullYear()+6; y++){
    ySel += '<option value="' + y + '"' + (y===calY?' selected':'') + '>' + y + '</option>';
  }
  ySel += '</select>';

  h += '<div class="calpop-main">' +
    '<div class="calpop-head">' +
      '<button class="calpop-x" data-act="calShift" data-d="-1" aria-label="Prejšnji mesec">‹</button>' +
      mSel + ySel +
      '<button class="calpop-x" data-act="calShift" data-d="1" aria-label="Naslednji mesec">›</button>' +
      '<span style="flex:1"></span>' +
      '<button class="btn btn-ghost btn-sm" data-act="calToday">Danes</button>' +
      '<button class="calpop-x" data-act="calClose" aria-label="Zapri koledar">×</button>' +
    '</div><div class="cal-grid">';
  for(const d of DOW_NAMES) h += '<div class="cal-dow">' + d + '</div>';
  for(let i=0;i<startDow;i++) h += '<div class="cal-day blank"></div>';
  for(let d=1; d<=daysInMonth; d++){
    const iso = calY + '-' + String(calM+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const evs = events[iso] || [];
    const dow = (startDow + d - 1) % 7;
    let cls = 'cal-day';
    if(dow>=5) cls += ' wend';
    if(iso===tIso) cls += ' today';
    if(iso===calSelDay) cls += ' sel';
    if(evs.length) cls += ' hasv';
    h += '<div class="' + cls + '" data-act="calDay" data-iso="' + iso + '">' +
      '<div class="cal-num">' + d + '</div><div class="cal-dots">';
    evs.slice(0,3).forEach(e=>{ h += '<span class="cal-dot dot-' + e.type + '"></span>'; });
    if(evs.length>3) h += '<span class="cal-more">+' + (evs.length-3) + '</span>';
    h += '</div></div>';
  }
  h += '</div>' +
    '<div class="callegend">' +
      '<span><i class="dot-borrow"></i>izposoja</span>' +
      '<span><i class="dot-due"></i>rok vrnitve</span>' +
      '<span><i class="dot-overdue"></i>zamuda</span>' +
      '<span><i class="dot-popis"></i>popis</span>' +
    '</div></div>';

  el('calPop').innerHTML = h;
}
function selectCalDay(iso){
  calSelDay = (calSelDay===iso) ? null : iso;
  renderCalPop();
}
function calShift(d){
  calM += d;
  if(calM<0){ calM = 11; calY--; }
  if(calM>11){ calM = 0; calY++; }
  calSelDay = null;
  renderCalPop();
}
function calToday(){
  const now = new Date();
  calY = now.getFullYear(); calM = now.getMonth(); calSelDay = null;
  renderCalPop();
}
/* rdeča značka na gumbu koledarja = število zamujenih izposoj */
function updateFab(){
  const n = overdueLoanCount();
  const b = el('fabBadge');
  if(!b) return;
  b.hidden = (n===0);
  b.textContent = n;
}

/* =====================================================================
   12. DNEVNIK, EXCEL IZVOZ, VARNOSTNA KOPIJA (admin)
===================================================================== */
function logFiltered(){
  const q = logFilter.q.trim().toLowerCase();
  return log.filter(e=>{
    if(logFilter.type && e.type!==logFilter.type) return false;
    if(q && !(String(e.name).toLowerCase().includes(q) ||
              String(e.code).toLowerCase().includes(q) ||
              String(e.borrower).toLowerCase().includes(q))) return false;
    return true;
  });
}
function renderLog(m){
  const rows = logFiltered();
  let h = '<h2 class="view-title">Dnevnik</h2>' +
    '<div class="view-sub">Zabeležene so samo izposoje in vračila opreme.</div>' +
    '<div class="toolrow">' +
      '<select class="calsel" data-change="logType" aria-label="Vrsta dogodka">' +
        '<option value=""' + (!logFilter.type?' selected':'') + '>Vsi dogodki</option>' +
        '<option value="borrow"' + (logFilter.type==='borrow'?' selected':'') + '>Samo izposoje</option>' +
        '<option value="return"' + (logFilter.type==='return'?' selected':'') + '>Samo vračila</option>' +
      '</select>' +
      '<input type="search" data-input="logSearch" placeholder="Išči po predmetu, kodi ali osebi …" value="' + esc(logFilter.q) + '">' +
      '<span class="result-cnt">' + rows.length + ' / ' + log.length + '</span>' +
      (log.length ? '<button class="btn btn-danger btn-sm" data-act="logClear">Počisti dnevnik</button>' : '') +
    '</div><div id="tableHost">' + logTableHTML(rows) + '</div>';
  m.innerHTML = h;
}
/* akcijska celica posamične izposoje v dnevniku: reverz + (vračilo, če je dovoljeno) */
function logActionCell(e){
  if(e.type !== 'borrow') return '<td></td>';
  const item = itemByCode(e.code);
  let btns = '<button class="btn btn-ghost btn-sm" data-act="reverz" data-code="' + esc(e.code) + '" data-time="' + esc(e.time||'') + '"' +
    (e.gid?' data-gid="' + esc(e.gid) + '"':'') + '>📄 Reverz</button>';
  if(item && borrowedQty(item) > 0 && (isAdmin() || (item.loans||[]).some(canReturn))){
    btns += '<button class="btn btn-primary btn-sm" data-act="return" data-id="' + esc(e.code) + '">↩ Vrni</button>';
  }
  return '<td><div class="fin-actcell" style="justify-content:flex-start;gap:6px;flex-wrap:wrap">' + btns + '</div></td>';
}
function logTableHTML(rows){
  if(!log.length)  return '<div class="tablewrap"><div class="empty">Dnevnik je prazen.</div></div>';
  if(!rows.length) return '<div class="tablewrap"><div class="empty">Noben zapis ne ustreza filtru.</div></div>';
  /* zapise iste skupinske izposoje (isti gid) združimo v en prikaz: oseba, rok
     in čas enkrat, predmeti pa našteti skupaj. Vračila in posamične izposoje
     ostanejo svoje vrstice. */
  const units = [];
  const byGid = {};
  for(const e of rows){
    if(e.gid){                           // skupinska izposoja ali skupinsko vračilo
      const key = e.type + '|' + e.gid;
      if(byGid[key] === undefined){
        byGid[key] = units.length;
        units.push({ group:true, type:e.type, gid:e.gid, time:e.time, borrower:e.borrower, email:e.email, until:e.until,
          items:[{ name:e.name, code:e.code, qty:e.qty }] });
      } else {
        units[byGid[key]].items.push({ name:e.name, code:e.code, qty:e.qty });
      }
    } else {
      units.push({ group:false, entry:e });
    }
  }
  let h = '<div class="tablewrap"><table><thead><tr>' +
    '<th>Čas</th><th>Dogodek</th><th>Predmet</th><th>Koda</th><th>Oseba</th><th>Kol.</th><th>Vrni do</th><th></th>' +
    '</tr></thead><tbody>';
  for(const u of units){
    if(u.group && u.items.length > 1){
      const total = u.items.reduce((s,it)=>s+it.qty, 0);
      const names = u.items.map(it=>esc(it.name)).join('<br>');
      const codes = u.items.map(it=>'<span class="tag">' + esc(it.code) + '</span>').join('<br>');
      const qtys  = u.items.map(it=>it.qty).join('<br>');
      const isB = u.type==='borrow';
      /* pri skupinski izposoji odpremo vračilo skupine, kjer izbereš predmet(e) */
      let canRet = false;
      if(isB){
        canRet = u.items.some(it=>{ const x=itemByCode(it.code);
          return x && borrowedQty(x)>0 && (isAdmin() || (x.loans||[]).some(canReturn)); });
      }
      h += '<tr class="log-grouprow">' +
        '<td style="white-space:nowrap;font-size:13px;vertical-align:top">' + esc(u.time) + '</td>' +
        '<td style="vertical-align:top">' +
          (isB ? '<span class="log-borrow">↗ Izposoja</span>' : '<span class="log-return">↩ Vračilo</span>') +
          ' <span class="more" title="Skupinsk' + (isB?'a izposoja':'o vračilo') + ': ' + u.items.length + ' predmetov, ' + total + ' kosov">skupina</span></td>' +
        '<td style="vertical-align:top;line-height:1.9">' + names + '</td>' +
        '<td style="vertical-align:top;line-height:1.9">' + codes + '</td>' +
        '<td style="vertical-align:top"><b>' + esc(u.borrower) + '</b>' +
          (u.email?'<br><small style="color:var(--ink-soft)">' + esc(u.email) + '</small>':'') +
          '<br><small style="color:var(--ink-soft)">' + u.items.length + ' predmetov · ' + total + ' kosov</small></td>' +
        '<td class="qtycell" style="vertical-align:top;line-height:1.9">' + qtys + '</td>' +
        '<td style="vertical-align:top">' + (isB ? fmtDate(u.until) : '—') + '</td>' +
        (isB
          ? '<td style="vertical-align:top"><div class="fin-actcell" style="justify-content:flex-start;gap:6px;flex-wrap:wrap">' +
              '<button class="btn btn-ghost btn-sm" data-act="reverz" data-gid="' + esc(u.gid) + '">📄 Reverz</button>' +
              (canRet ? '<button class="btn btn-primary btn-sm" data-act="returnGroupPick" data-gid="' + esc(u.gid) + '">↩ Vrni</button>' : '') +
            '</div></td>'
          : '<td style="vertical-align:top"></td>') +
      '</tr>';
    } else {
      const e = u.group ? { type:u.type, time:u.time, gid:u.gid, name:u.items[0].name, code:u.items[0].code,
                            borrower:u.borrower, email:u.email, qty:u.items[0].qty, until:u.until } : u.entry;
      h += '<tr>' +
        '<td style="white-space:nowrap;font-size:13px">' + esc(e.time) + '</td>' +
        '<td>' + (e.type==='borrow'?'<span class="log-borrow">↗ Izposoja</span>':'<span class="log-return">↩ Vračilo</span>') + '</td>' +
        '<td>' + esc(e.name) + '</td>' +
        '<td><span class="tag">' + esc(e.code) + '</span></td>' +
        '<td>' + whoHTML(e) + '</td>' +
        '<td class="qtycell">' + e.qty + '</td>' +
        '<td>' + (e.type==='borrow'?fmtDate(e.until):'—') + '</td>' +
        (e.type==='borrow' ? logActionCell(e) : '<td></td>') +
      '</tr>';
    }
  }
  return h + '</tbody></table></div>';
}
function updateLogTable(){
  const host = el('tableHost');
  if(host) host.innerHTML = logTableHTML(logFiltered());
}
function clearLog(){
  confirmDialog('Celoten dnevnik izposoj in vračil bo izbrisan. Tega ni mogoče razveljaviti.', ()=>{
    log = [];
    logFilter = { type:'', q:'' };
    saveData();
    switchView('log');
    toast('Dnevnik počiščen.');
  }, 'Počisti');
}

function ensureReverzStyle(){
  if(document.getElementById('reverzStyle')) return;
  const s = document.createElement('style');
  s.id = 'reverzStyle';
  s.textContent = REVERZ_CSS;
  document.head.appendChild(s);
}
function buildReverzData(entries){
  const first = entries[0];
  let u = first.borrowerId ? userById(first.borrowerId) : null;
  if(!u && first.email) u = users.find(x => (x.email||'').toLowerCase() === String(first.email).toLowerCase());
  const items = entries.map(e=>({ code:e.code, name:e.name, qty:e.qty }));
  return { first, u: u || {}, items };
}
function reverzRows(items){
  let rows = '';
  const n = Math.max(items.length, 12);
  for(let i=0;i<n;i++){
    const it = items[i];
    rows += '<tr>' +
      '<td class="num">' + (i+1) + '.</td>' +
      '<td contenteditable="true">' + (it?esc(it.code):'') + '</td>' +
      '<td contenteditable="true">' + (it?esc(it.name):'') + '</td>' +
      '<td class="qty" contenteditable="true">' + (it?it.qty:'') + '</td>' +
      '<td contenteditable="true"></td></tr>';
  }
  return rows;
}
function reverzSheetHTML(entries){
  const d = buildReverzData(entries);
  const u = d.u;
  const borrowerName = d.first.borrower || [u.firstName, u.lastName].filter(Boolean).join(' ');
  const postLine = [u.zip, u.city].filter(Boolean).join(' ');
  const contact = [u.phone, d.first.email].filter(Boolean).join(', ');
  const year = new Date().getFullYear();
  return '<div class="letterhead">' +
        '<div class="lh-txt"><div>Društvo tabornikov Rod močvirski tulipani</div>' +
          '<div>Tržaška cesta 74, 1000 Ljubljana</div>' +
          '<div>Davčna: 82438935</div></div>' +
        '<img src="' + REVERZ_LOGO + '" alt="Rod močvirski tulipani"></div>' +
      '<div class="title">REVERZ št: <span contenteditable="true">00/' + year + '</span></div>' +
      '<div class="subtitle">(Naziv organizacije)</div>' +
      '<table class="meta">' +
        '<tr><td class="lbl">Podjetje ali druga organizacija:</td><td contenteditable="true"></td></tr>' +
        '<tr><td class="lbl">Ulica in hišna številka:</td><td contenteditable="true">' + esc(u.address||'') + '</td></tr>' +
        '<tr><td class="lbl">Pošta in poštna številka:</td><td contenteditable="true">' + esc(postLine) + '</td></tr>' +
        '<tr><td class="lbl">Ime in priimek:</td><td contenteditable="true">' + esc(borrowerName) + '</td></tr>' +
        '<tr><td class="lbl">Kontakt:</td><td contenteditable="true">' + esc(contact) + '</td></tr>' +
      '</table>' +
      '<p class="clause">Prevzemnik se obveže, da bo opremo vrnil v stanju, kot je bilo evidentirano ob prevzemu. V nasprotnem primeru je dolžan pokriti finančne stroške, ki bi nastali zaradi vzpostavitve prvotnega stanja (servis, popravilo, …).</p>' +
      '<p class="clause">Za spore iz tega reverza, ki je napisan v dveh izvodih in veljata za original, je pristojno sodišče v Ljubljani.</p>' +
      '<table class="items"><thead><tr>' +
        '<th class="col1">Zap. št</th><th class="col2">Koda</th><th class="col3">Naziv artikla</th><th class="col4">Količina</th><th class="col5">Opomba</th>' +
        '</tr></thead><tbody>' + reverzRows(d.items) + '</tbody></table>' +
      '<div class="dates"><div>Datum prevzema: <b contenteditable="true">' + esc(d.first.time||'') + '</b></div>' +
        '<div>Datum vrnitve: <b contenteditable="true">' + esc(d.first.until?fmtDate(d.first.until):'') + '</b></div></div>' +
      '<div class="signs">' +
        '<div class="oddal">Oddal:<span class="sigline"></span>' +
          '<div class="who">Dren Dolničar<br>040 662 030<br>dren.dolnicar@gmail.com</div></div>' +
        '<div class="prejel">Prejel:<span class="sigline"></span></div>' +
      '</div>';
}
function openReverz(entries){
  if(!entries || !entries.length){ toast('Za to izposojo ni mogoče sestaviti reverza.'); return; }
  ensureReverzStyle();
  let ov = document.getElementById('reverzOverlay');
  if(!ov){
    ov = document.createElement('div');
    ov.id = 'reverzOverlay';
    ov.innerHTML =
      '<div class="rv-toolbar">' +
        '<button type="button" class="rv-print" onclick="printReverz()">🖨 Natisni / Shrani PDF</button>' +
        '<button type="button" class="rv-close" onclick="closeReverz()">Zapri</button>' +
        '<span class="rv-hint">Polja lahko urejaš (klikni in piši) — npr. številko reverza ali „Podjetje". Nato natisni ali shrani kot PDF.</span>' +
      '</div>' +
      '<div class="rv-scroll"><div id="rvSheet"></div></div>';

  }
  document.getElementById('rvSheet').innerHTML = reverzSheetHTML(entries);
  document.body.classList.add('rv-open');
  ov.scrollTop = 0;
}
function printReverz(){ window.print(); }
function closeReverz(){
  document.body.classList.remove('rv-open');
  const ov = document.getElementById('reverzOverlay');
  if(ov) ov.remove();
}
function reverzFor(b){
  let entries;
  if(b.dataset.gid) entries = log.filter(e => e.type==='borrow' && e.gid===b.dataset.gid);
  else entries = log.filter(e => e.type==='borrow' && e.code===b.dataset.code && e.time===b.dataset.time);
  openReverz(entries);
}

function renderExcel(m){

function sheetName(s){
  return s.replace(/[\\/?*\[\]:]/g,'').slice(0,31) || 'List';
}
function exportExcel(){
  if(typeof XLSX === 'undefined'){ toast('Knjižnica za Excel ni naložena (potrebna je internetna povezava).'); return; }
  const wb = XLSX.utils.book_new();
  const rowOf = i => {
    const c = catById(i.cat);
    const r = {
      'Koda':i.id, 'Predmet':i.name,
      'Kategorija':c?c.name:i.cat, 'Podkategorija':i.subcat||'',
      'Skupaj':i.qty, 'Na voljo':availQty(i), 'Izposojeno':borrowedQty(i),
      'Status':itemStatus(i).txt, 'Dokumenti (PDF)':(i.files?i.files.length:0), 'Opomba':i.note||''
    };
    for(const f of catFields(i.cat)){
      const v = customVal(i, f);
      if(f.type==='multiselect')      r[f.name] = (v||[]).join('; ');
      else if(f.type==='checkbox')    r[f.name] = v ? 'DA' : '';
      else                            r[f.name] = (v !== undefined && v !== null) ? String(v) : '';
    }
    return r;
  };
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(inventory.map(rowOf)), 'Vsi predmeti');
  for(const c of categories){
    const items = inventory.filter(i=>i.cat===c.id);
    if(items.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(items.map(rowOf)), sheetName(c.name));
  }
  const loans = [];
  for(const i of inventory){
    for(const l of i.loans){
      loans.push({ 'Koda':i.id, 'Predmet':i.name, 'Izposojeno pri':l.borrower, 'E-mail':l.email||'', 'Količina':l.qty,
        'Od':l.from, 'Vrni do':l.until, 'Zamuda':isOverdue(l)?'DA':'', 'Opomba':l.note||'' });
    }
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(loans.length?loans:[{'Info':'Ni odprtih izposoj'}]), 'Trenutne izposoje');
  const logRows = log.map(e => ({
    'Čas':e.time, 'Dogodek':e.type==='borrow'?'Izposoja':'Vračilo',
    'Predmet':e.name, 'Koda':e.code, 'Oseba':e.borrower, 'E-mail':e.email||'', 'Količina':e.qty,
    'Vrni do':e.type==='borrow'?(e.until||''):''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(logRows.length?logRows:[{'Info':'Dnevnik je prazen'}]), 'Dnevnik');
  const userRows = users.map(u => ({
    'Ime':u.firstName||'', 'Priimek':u.lastName||'', 'E-mail':u.email||'',
    'Vloga':u.role==='admin'?'Gospodar opreme':'Tabornik', 'Uporabniško ime':u.username||''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(userRows.length?userRows:[{'Info':'Ni uporabnikov'}]), 'Uporabniki');
  XLSX.writeFile(wb, 'RMT_inventura_' + todayISO() + '.xlsx');
  toast('Excel datoteka prenesena.');
}

function exportJSON(){
  const data = {
    app: 'RMT Inventura',
    version: 2,
    exported: new Date().toISOString(),
    categories, inventory, log, finance, users
  };
  const json = JSON.stringify(data, null, 2);
  try{
    const blob = new Blob([json], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'RMT_inventura_kopija_' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    toast('Varnostna kopija prenesena.');
  }catch(e){
    console.error(e);
    toast('Prenos ni uspel.');
  }

function handleImportFile(input){
  const file = input.files && input.files[0];
  input.value = '';                       // omogoči ponovno izbiro iste datoteke
  if(!file) return;
  importJSONFile(file);
}
function importJSONFile(file){
  const reader = new FileReader();
  reader.onerror = ()=>toast('Datoteke ni bilo mogoče prebrati.');
  reader.onload = ()=>{
    let d;
    try{ d = JSON.parse(reader.result); }
    catch(e){ toast('To ni veljavna JSON datoteka.'); return; }
    if(!d || !Array.isArray(d.categories) || !Array.isArray(d.inventory)){
      toast('Datoteka ni varnostna kopija RMT Inventure (manjkajo kategorije ali inventar).');
      return;
    }
    if(d.inventory.some(i => !i || typeof i.id !== 'string' || typeof i.name !== 'string')){
      toast('Datoteka je poškodovana: predmeti nimajo kode ali imena.');
      return;
    }
    const newLog = Array.isArray(d.log) ? d.log : [];
    confirmDialog(
      'Trenutni podatki (' + inventory.length + ' predmetov, ' + categories.length + ' kategorij) bodo zamenjani s podatki iz kopije' +
      (d.exported ? ' z dne ' + fmtDate(String(d.exported).slice(0,10)) : '') +
      ' (' + d.inventory.length + ' predmetov, ' + d.categories.length + ' kategorij). Uporabniški računi ostanejo nespremenjeni.',
      ()=>{
        categories = d.categories;
        inventory  = d.inventory;
        log        = newLog;
        finance    = normalizeFinance(d.finance);
        migrateData();                    // stare kopije s šotorskim zapisom se migrirajo
        saveData();
        switchView('backup');
        toast('Podatki obnovljeni iz varnostne kopije.');
      }, 'Obnovi');
  };
  reader.readAsText(file);
}

/* =====================================================================
   12b. FINANČNIK (admin) — nakupi opreme, popravila, nakupni seznam
   Podatki so v finance = { purchases, repairs, wishlist } znotraj appstate.
   Zneski so skupni (ne na kos). Grafi so risani v SVG (brez zunanjih knjižnic).
===================================================================== */
const FIN_MON = ['jan','feb','mar','apr','maj','jun','jul','avg','sep','okt','nov','dec'];
const FIN_MON_FULL = ['januar','februar','marec','april','maj','junij','julij','avgust','september','oktober','november','december'];
const FIN_PRI = { high:{ label:'Nujno', cls:'pri-high', rank:0 },
                  med: { label:'Srednje', cls:'pri-med', rank:1 },
                  low: { label:'Lahko počaka', cls:'pri-low', rank:2 } };
const FIN_PAL = ['var(--pine)','var(--ember)','var(--gold)','var(--moss)','var(--wood-light)','var(--alert)'];
function finCatColor(i){ return FIN_PAL[i % FIN_PAL.length]; }
function finMonthKey(d){ d = d || new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
let finMonth = finMonthKey();                       // izbrani mesec v finančniku (YYYY-MM)
function finMonthLabel(key){ const p = key.split('-'); return FIN_MON_FULL[parseInt(p[1],10)-1] + ' ' + p[0]; }
function finShiftMonth(delta){
  const p = finMonth.split('-').map(Number);
  finMonth = finMonthKey(new Date(p[0], p[1]-1+delta, 1));
  if(activeNav==='finance') renderFinance(el('main'));
}
function finToday(){ finMonth = finMonthKey(); if(activeNav==='finance') renderFinance(el('main')); }
function inFinMonth(e, key){ return (e.date||'').slice(0,7) === key; }
function finCatLabel(id){ const c = catById(id); return c ? (c.icon + ' ' + c.name) : 'Nerazvrščeno'; }
/* poraba (nakupi + popravila) po kategorijah za izbrani mesec; brez kategorije pod '_' */
function finSpentByCat(key){
  const map = {};
  const add = list => { for(const e of (list||[])){ if(!inFinMonth(e,key)) continue; const k = e.cat || '_'; map[k] = (map[k]||0) + (Number(e.amount)||0); } };
  add(finance.purchases); add(finance.repairs);
  return map;
}
function finMonthSpent(key){ const m = finSpentByCat(key); let s = 0; for(const k in m) s += m[k]; return s; }
function finBudgetTotal(){ let s = 0; for(const c of categories) s += Number(finance.budgets[c.id])||0; return s; }
function normalizeFinance(f){
  f = (f && typeof f === 'object') ? f : {};
  return {
    purchases: Array.isArray(f.purchases) ? f.purchases : [],
    repairs:   Array.isArray(f.repairs)   ? f.repairs   : [],
    wishlist:  Array.isArray(f.wishlist)  ? f.wishlist  : [],
    budgets:   (f.budgets && typeof f.budgets === 'object') ? f.budgets : {}   // mesečni proračun na kategorijo
  };
}
function finList(kind){
  return kind==='purchase' ? finance.purchases : kind==='repair' ? finance.repairs : finance.wishlist;
}
function finUid(){ return 'F' + Date.now() + Math.random().toString(36).slice(2,7); }
function finSum(list){ return (list||[]).reduce((s,e)=>s + (Number(e.amount)||0), 0); }
function fmtEur(n){
  n = Number(n) || 0;
  try{ return n.toLocaleString('sl-SI', { style:'currency', currency:'EUR', minimumFractionDigits:2, maximumFractionDigits:2 }); }
  catch(e){ return n.toFixed(2).replace('.', ',') + ' €'; }
}
function finShort(n){           // kompaktna oznaka za graf (npr. 1,2k)
  n = Math.round(Number(n)||0);
  return n >= 1000 ? (n/1000).toFixed(1).replace('.', ',') + 'k' : String(n);
}
function parseAmount(s){
  if(typeof s === 'number') return s;
  const v = parseFloat(String(s).replace(/\s/g, '').replace(',', '.'));
  return isFinite(v) ? v : NaN;
}

/* poraba po mesecih (zadnjih 6 mesecev), ločeno nakupi/popravila */
function finMonthly(){
  const months = [];
  const idx = {};
  const now = new Date();
  for(let k=5; k>=0; k--){
    const d = new Date(now.getFullYear(), now.getMonth()-k, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    idx[key] = months.length;
    months.push({ key, label: FIN_MON[d.getMonth()], buy:0, fix:0 });
  }
  const acc = (list, field) => { for(const e of (list||[])){ const k = (e.date||'').slice(0,7); if(k in idx) months[idx[k]][field] += Number(e.amount)||0; } };
  acc(finance.purchases, 'buy');
  acc(finance.repairs, 'fix');
  return months;
}
function finBarChart(){
  const data = finMonthly();
  if(!data.some(m => m.buy + m.fix > 0)) return '<div class="fin-chart-empty">Ni vnosov v zadnjih šestih mesecih.</div>';
  const max = Math.max(1, ...data.map(m => m.buy + m.fix));
  const W=480, H=212, padL=10, padR=10, padT=16, padB=26;
  const plotH = H-padT-padB, plotW = W-padL-padR, slot = plotW/data.length, bw = Math.min(44, slot*0.5);
  const baseY = padT + plotH;
  let svg = '';
  data.forEach((m, i)=>{
    const cx = padL + slot*i + slot/2;
    const total = m.buy + m.fix;
    const hBuy = m.buy/max*plotH, hFix = m.fix/max*plotH;
    let y = baseY;
    if(hBuy > 0){ y -= hBuy; svg += '<rect x="' + (cx-bw/2).toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + hBuy.toFixed(1) + '" rx="2" fill="var(--pine)"></rect>'; }
    if(hFix > 0){ y -= hFix; svg += '<rect x="' + (cx-bw/2).toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + hFix.toFixed(1) + '" rx="2" fill="var(--ember)"></rect>'; }
    if(total > 0) svg += '<text x="' + cx.toFixed(1) + '" y="' + (y-5).toFixed(1) + '" text-anchor="middle" font-size="10" font-family="ui-monospace,monospace" fill="var(--ink-soft)">' + finShort(total) + '</text>';
    svg += '<text x="' + cx.toFixed(1) + '" y="' + (H-8) + '" text-anchor="middle" font-size="11" fill="var(--ink-soft)">' + m.label + '</text>';
  });
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Poraba po mesecih">' +
    '<line x1="' + padL + '" y1="' + baseY + '" x2="' + (W-padR) + '" y2="' + baseY + '" stroke="var(--line)" stroke-width="1"></line>' +
    svg + '</svg>' +
    '<div class="fin-legend"><span><i style="background:var(--pine)"></i>Nakupi</span><span><i style="background:var(--ember)"></i>Popravila</span></div>';
}
function finDonut(key){
  const spent = finSpentByCat(key);
  const parts = [];
  categories.forEach((c,i)=>{ const v = spent[c.id]||0; if(v>0) parts.push({ name:c.name, val:v, color:finCatColor(i) }); });
  if(spent['_'] > 0) parts.push({ name:'Nerazvrščeno', val:spent['_'], color:'var(--ink-soft)' });
  const tot = parts.reduce((s,p)=>s+p.val, 0);
  if(tot <= 0) return '<div class="fin-chart-empty">Ta mesec ni zabeleženih stroškov.</div>';
  const cx=80, cy=80, r=58, sw=22, C = 2*Math.PI*r;
  let off = 0, rings = '', legend = '';
  for(const p of parts){
    const frac = p.val/tot;
    rings += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + p.color +
      '" stroke-width="' + sw + '" stroke-dasharray="' + (frac*C).toFixed(2) + ' ' + C.toFixed(2) +
      '" stroke-dashoffset="' + (-off*C).toFixed(2) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
    legend += '<span><i style="background:' + p.color + '"></i>' + esc(p.name) + ' · ' + fmtEur(p.val) + ' (' + Math.round(frac*100) + '%)</span>';
    off += frac;
  }
  return '<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">' +
    '<svg viewBox="0 0 160 160" width="150" height="150" role="img" aria-label="Poraba po kategorijah">' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--line-soft)" stroke-width="' + sw + '"></circle>' +
      rings +
      '<text x="' + cx + '" y="' + (cy-2) + '" text-anchor="middle" font-size="14" font-family="ui-monospace,monospace" font-weight="700" fill="var(--ink)">' + finShort(tot) + ' €</text>' +
      '<text x="' + cx + '" y="' + (cy+15) + '" text-anchor="middle" font-size="9" letter-spacing="1.5" fill="var(--ink-soft)">MESEC</text>' +
    '</svg>' +
    '<div class="fin-legend" style="flex-direction:column;gap:9px;margin-top:0">' + legend + '</div></div>';
}
/* vrstice proračun vs porabljeno za izbrani mesec (osrednji element načrtovalnika) */
function finBudgetRows(key){
  const spent = finSpentByCat(key);
  let h = '';
  categories.forEach((c,i)=>{
    const sp = spent[c.id]||0, bud = Number(finance.budgets[c.id])||0;
    const pct = bud>0 ? Math.min(100, sp/bud*100) : (sp>0?100:0);
    const over = bud>0 && sp>bud, near = bud>0 && !over && sp/bud>=0.8;
    const col = over ? 'var(--alert)' : near ? 'var(--gold)' : finCatColor(i);
    h += '<div class="bgt-row">' +
      '<div class="bgt-name">' + esc(c.icon) + ' ' + esc(c.name) + '</div>' +
      '<div class="bgt-bar"><i style="width:' + pct.toFixed(0) + '%;background:' + col + '"></i></div>' +
      '<div class="bgt-fig' + (over?' over':'') + '"><b>' + fmtEur(sp) + '</b> <span>/ ' + (bud>0?fmtEur(bud):'ni proračuna') + '</span></div>' +
    '</div>';
  });
  if(spent['_'] > 0){
    h += '<div class="bgt-row">' +
      '<div class="bgt-name" style="color:var(--ink-soft)">Nerazvrščeno</div>' +
      '<div class="bgt-bar"><i style="width:100%;background:var(--ink-soft)"></i></div>' +
      '<div class="bgt-fig"><b>' + fmtEur(spent['_']) + '</b> <span>/ —</span></div>' +
    '</div>';
  }
  return h;
}
function finRowsByDate(list){
  return (list||[]).slice().sort((a,b)=> String(b.date||'').localeCompare(String(a.date||'')));
}
function finPurchasesTable(key){
  const rows = finRowsByDate(finance.purchases.filter(e=>inFinMonth(e,key)));
  if(!rows.length) return '<div class="tablewrap"><div class="fin-empty">Ta mesec ni nakupov. Dodaj z gumbom zgoraj.</div></div>';

function finRepairsTable(key){
  const rows = finRowsByDate(finance.repairs.filter(e=>inFinMonth(e,key)));
  if(!rows.length) return '<div class="tablewrap"><div class="fin-empty">Ta mesec ni popravil.</div></div>';
  let h = '<div class="tablewrap"><table><thead><tr><th>Datum</th><th>Predmet / opis</th><th>Kategorija</th><th style="text-align:right">Znesek</th><th>Opomba</th><th></th></tr></thead><tbody>';
  for(const e of rows){
    h += '<tr>' +
      '<td style="white-space:nowrap">' + fmtDate(e.date) + '</td>' +

      '<td style="color:var(--ink-soft)">' + esc(finCatLabel(e.cat)) + '</td>' +
      '<td class="fin-amt">' + fmtEur(e.amount) + '</td>' +
      '<td style="color:var(--ink-soft)">' + esc(e.note||'') + '</td>' +
      '<td><div class="fin-actcell">' +
        '<button class="btn btn-ghost btn-sm" data-act="finEdit" data-kind="repair" data-id="' + esc(e.id) + '">Uredi</button>' +
        '<button class="btn btn-danger btn-sm" data-act="finDel" data-kind="repair" data-id="' + esc(e.id) + '">✕</button>' +
      '</div></td></tr>';
  }
  return h + '</tbody></table></div>';

function finWishlistTable(){
  const rows = (finance.wishlist||[]).slice().sort((a,b)=>{
    const ra = (FIN_PRI[a.priority]||FIN_PRI.med).rank, rb = (FIN_PRI[b.priority]||FIN_PRI.med).rank;

function saveFinanceEntry(kind, id){
  if(!isAdmin()) return;
  const name = el('fName').value.trim();
  if(!name){ toast('Vpiši naziv predmeta oziroma opis.'); return; }
  const amount = parseAmount(el('fAmount').value);
  if(isNaN(amount) || amount < 0){ toast('Vpiši veljaven znesek (npr. 24,90).'); return; }
  const entry = { name, amount, note: el('fNote').value.trim(),
    cat: el('fCat') ? (el('fCat').value || '') : '',
    code: (el('fCode') && el('fCode').value) ? el('fCode').value : '' };
  if(kind !== 'wishlist'){ entry.date = el('fDate').value || todayISO(); }
  if(kind !== 'repair'){ const q = parseInt(el('fQty').value, 10); entry.qty = (q && q>0) ? q : 1; }
  if(kind === 'wishlist'){ entry.priority = el('fPriority').value || 'med'; }
  const list = finList(kind);
  if(id){
    const cur = list.find(x=>x.id===id);
    if(!cur){ toast('Vnosa ni mogoče najti.'); return; }
    Object.assign(cur, entry);
  } else {
    entry.id = finUid();
    list.unshift(entry);
  }
  saveData();
  closeModal();
  toast('Vnos shranjen.');
  if(activeNav==='finance') renderFinance(el('main'));
}
function openBudgetModal(){
  if(!isAdmin()) return;
  const rows = categories.map(c=>{

    return '<div class="field"><label>' + esc(c.icon) + ' ' + esc(c.name) + ' — mesečni proračun (€)</label>' +
      '<input id="bud_' + esc(c.id) + '" inputmode="decimal" value="' + esc(val) + '" placeholder="0,00"></div>';

      '<button class="btn btn-primary" data-act="finBudgetsSave">Shrani</button></div>');
}
function saveBudgets(){
  if(!isAdmin()) return;
  const b = {};
  for(const c of categories){
    const inp = el('bud_' + c.id);
    if(!inp) continue;
    const raw = inp.value.trim();
    if(raw === '') continue;
    const v = parseAmount(raw);
    if(isNaN(v) || v < 0){ toast('Neveljaven znesek pri ' + c.name + '.'); return; }
    b[c.id] = v;
  }
  finance.budgets = b;
  saveData();
  closeModal();
  toast('Proračuni shranjeni.');
  if(activeNav==='finance') renderFinance(el('main'));
}
function deleteFinanceEntry(kind, id){
  if(!isAdmin()) return;
  const list = finList(kind);
  const e = list.find(x=>x.id===id);
  if(!e) return;
  confirmDialog('Vnos »' + (e.name||'') + '« (' + fmtEur(e.amount) + ') bo izbrisan.', ()=>{
    const i = list.findIndex(x=>x.id===id);
    if(i>=0) list.splice(i,1);
    saveData();
    closeModal();
    toast('Vnos izbrisan.');
    if(activeNav==='finance') renderFinance(el('main'));
  });
}
/* premakne vnos z nakupnega seznama med opravljene nakupe (z današnjim datumom) */
function wishlistToPurchase(id){
  if(!isAdmin()) return;
  const i = finance.wishlist.findIndex(x=>x.id===id);
  if(i<0) return;
  const w = finance.wishlist[i];
  finance.purchases.unshift({ id:finUid(), date:todayISO(), cat:w.cat||'', code:w.code||'', name:w.name, qty:w.qty||1, amount:Number(w.amount)||0,
    note: w.note ? w.note + ' (z nakupnega seznama)' : 'z nakupnega seznama' });
  finance.wishlist.splice(i,1);
  saveData();
  toast('Označeno kot kupljeno: ' + w.name);
  if(activeNav==='finance') renderFinance(el('main'));
}

async function changeUserRole(id, role){
  const u = userById(id);
  if(!u) return;
  const newRole = role==='admin' ? 'admin' : 'user';
  if(u.role==='admin' && newRole==='user' && users.filter(x=>x.role==='admin').length<=1){
    toast('Vsaj en gospodar opreme mora ostati.'); switchView('users'); return;
  }
  const { error } = await sb.from('profiles').update({ role:newRole }).eq('id', id);
  if(error){ toast(sbErr(error, 'Spremembe vloge ni bilo mogoče shraniti.')); return; }
  await dbLoadUsers();
  toast('Vloga posodobljena.');
  switchView('users');
}
function deleteUser(id){
  const u = userById(id);
  if(!u) return;
  if(currentUser && u.id===currentUser.id){ toast('Sebe ne moreš odstraniti.'); return; }
  if(u.role==='admin' && users.filter(x=>x.role==='admin').length<=1){ toast('Vsaj en gospodar opreme mora ostati.'); return; }
  confirmDialog('Uporabnik »' + userDisplay(u) + '« (' + (u.email||'') + ') bo odstranjen iz aplikacije. Pretekle izposoje in dnevnik ostanejo zabeleženi. Prijavni račun se v celoti odstrani v Supabase nadzorni plošči.', async ()=>{
    const { error } = await sb.from('profiles').delete().eq('id', id);
    if(error){ toast(sbErr(error, 'Odstranitev ni uspela.')); return; }
    await dbLoadUsers();
    toast('Uporabnik odstranjen.');
    switchView('users');
  });
}

      '</div>' +
      (needOpts ? '<input type="text" class="frow-opts" placeholder="Možnosti, ločene s ; (npr. OK; Poškodovano; Manjka)"' +
        ' value="' + esc((f._opts !== undefined) ? f._opts : (f.options||[]).join('; ')) + '" data-input="fieldOpts" data-change="fieldOpts" data-idx="' + i + '">' +
        colorRowsHTML(f, i) : '') +
      '</div>';
  });
  host.innerHTML = h || '<div class="sub" style="color:var(--ink-soft);font-size:12.5px;margin-bottom:8px">Ta kategorija še nima dodatnih stolpcev.</div>';

function setDraftColor(idx, opt, color){
  const f = draftFields[idx];
  if(!f) return;
  if(!f._colors) f._colors = Object.assign({}, f.colors || {});
  if(color) f._colors[opt] = color;
  else delete f._colors[opt];
  renderFieldRows();
}
function addDraftField(){
  draftFields.push({ id:'f_' + Date.now() + '_' + draftFields.length, name:'', type:'text', options:[], _opts:'', _colors:{} });
  renderFieldRows();
  const names = document.querySelectorAll('.frow-name');
  if(names.length) names[names.length-1].focus();
}
function removeDraftField(i){
  draftFields.splice(i, 1);
  renderFieldRows();
}
function moveDraftField(i, d){
  const j = i + d;
  if(j<0 || j>=draftFields.length) return;
  const t = draftFields[i]; draftFields[i] = draftFields[j]; draftFields[j] = t;
  renderFieldRows();
}
/* vrne urejen seznam stolpcev ali null ob napaki (s toastom) */
function collectDraftFields(){
  const out = [];
  for(const f of draftFields){
    const name = (f.name||'').trim();
    if(!name) continue;                   // prazne vrstice preskočimo
    const fld = { id:f.id, name, type:f.type };
    if(f.type==='select' || f.type==='multiselect'){
      const raw = (f._opts !== undefined) ? f._opts : (f.options||[]).join('; ');
      const opts = raw.split(';').map(s=>s.trim()).filter(Boolean);
      if(!opts.length){ toast('Stolpec »' + name + '« potrebuje vsaj eno možnost (loči jih s ; ).'); return null; }
      fld.options = opts;
      const src = (f._colors !== undefined) ? f._colors : (f.colors || {});
      const colors = {};                  // barve obdržimo le za možnosti, ki še obstajajo
      for(const o of opts) if(src[o]) colors[o] = src[o];
      fld.colors = colors;
    }
    out.push(fld);
  }
  return out;
}

function saveEditCategory(id){
  const c = catById(id);
  if(!c || !draftCat) return;
  const name = el('cName').value.trim();
  const icon = el('cIcon').value.trim() || c.icon;
  if(!name){ toast('Vpiši ime kategorije.'); return; }
  if(categories.some(x=>x.id!==id && x.name.toLowerCase()===name.toLowerCase())){ toast('Kategorija s tem imenom že obstaja.'); return; }
  /* sestavi nove podkategorije, preveri prazne in podvojene */
  const rows = draftCat.subs.map(s=>({ orig:s.orig, name:(s.name||'').trim() })).filter(s=>s.name);
  const lower = rows.map(s=>s.name.toLowerCase());
  if(new Set(lower).size !== lower.length){ toast('Podkategorije se ne smejo ponavljati.'); return; }
  /* odstranjene podkategorije z obstoječimi predmeti niso dovoljene */
  const removed = (c.subcats||[]).filter(orig => !rows.some(r=>r.orig===orig));
  for(const r of removed){
    const cnt = inventory.filter(i=>i.cat===id && i.subcat===r).length;
    if(cnt>0){ toast('Podkategorija »' + r + '« vsebuje ' + cnt + ' predmetov in je ni mogoče odstraniti.'); return; }
  }
  /* preimenovanja prenesi na predmete */
  for(const r of rows){
    if(r.orig && r.orig !== r.name){
      for(const i of inventory) if(i.cat===id && i.subcat===r.orig) i.subcat = r.name;
    }
  }
  c.name = name;
  c.icon = icon;
  c.subcats = rows.map(r=>r.name);
  draftCat = null;
  saveData();
  closeModal();
  toast('Kategorija shranjena.');
  switchView('cats');
}

  const cnt = inventory.filter(i=>i.cat===catId && i.subcat===sub).length;
  if(cnt>0){ toast('Podkategorija vsebuje ' + cnt + ' predmetov — najprej jih premakni.'); return; }

/* =====================================================================
   14. MODALNA OKNA, POTRDITVE IN OBVESTILA
===================================================================== */
function openModal(html){
  el('modalBox').innerHTML = html;
  el('modalWrap').classList.add('on');
}
function closeModal(){
  el('modalWrap').classList.remove('on');
  el('modalBox').innerHTML = '';
  flushPendingRemote();
}
/* lepo potrditveno okno; besedilo gre prek textContent (varno pred XSS) */
function confirmDialog(msg, cb, btnLabel){
  el('confirmMsg').textContent = msg;
  el('confirmBtn').textContent = btnLabel || 'Izbriši';
  confirmCb = cb;
  el('confirmWrap').classList.add('on');
}
function closeConfirm(){
  el('confirmWrap').classList.remove('on');
  confirmCb = null;
  flushPendingRemote();
}
function confirmYes(){
  const cb = confirmCb;
  closeConfirm();
  if(cb) cb();
}
let toastTimer = null;
function toast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('on'), 2600);
}

  /* okna */
  modalClose: ()=>closeModal(),
  modalBg:    (b,e)=>{ if(e.target===el('modalWrap')) closeModal(); },
  confirmNo:  ()=>closeConfirm(),
  confirmBg:  (b,e)=>{ if(e.target===el('confirmWrap')) closeConfirm(); },
  confirmYes: ()=>confirmYes()
};

document.addEventListener('click', e=>{
  const b = e.target.closest('[data-act]');
  if(b){
    const fn = ACTIONS[b.dataset.act];
    if(fn){ fn(b, e); }
    return;
  }
  /* klik na vrstico tabele odpre kartico predmeta */
  const row = e.target.closest('tr.rowlink');
  if(row && !e.target.closest('button,input,select,a,label')){
    showItemDetail(row.dataset.id);
    return;
  }
  /* klik izven koledarja ga zapre */
  const pop = el('calPop');
  if(pop && pop.classList.contains('on') && !e.target.closest('#calPop') && !e.target.closest('#calFab')){
    closeCalPop();
  }
});

const CHANGES = {
  customChk:  t=>setCustom(t.dataset.id, t.dataset.fid, t.checked),
  customSel:  t=>{
    setCustom(t.dataset.id, t.dataset.fid, t.value);
    const item = itemByCode(t.dataset.id);             // izbirnik takoj obarvamo po novi vrednosti
    const f = item ? catFields(item.cat).find(x=>x.id===t.dataset.fid) : null;
    const c = f ? optColor(f, t.value) : null;
    t.style.color = c || ''; t.style.borderColor = c || ''; t.style.fontWeight = c ? '700' : '';
  },
  customTxt:  t=>setCustom(t.dataset.id, t.dataset.fid, t.value.trim()),
  customDate: t=>{                       // ročni vpis datuma z normalizacijo
    const raw = t.value.trim();
    if(!raw){ setCustom(t.dataset.id, t.dataset.fid, ''); return; }
    const iso = parseDateInput(raw);
    if(!iso){
      toast('Neveljaven datum. Primeri: 15. 6. 2026, 15.6.26, 2026-06-15');
      const item = itemByCode(t.dataset.id);
      t.value = fmtDateInput(item && item.custom ? (item.custom[t.dataset.fid]||'') : '');
      return;
    }
    setCustom(t.dataset.id, t.dataset.fid, iso);
    t.value = fmtDateInput(iso);
  },
  multiChk:   t=>multiExclusive(t),
  itemCat:    t=>fillSubcats(),
  fieldType:  t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f){ f.type = t.value; renderFieldRows(); } },
  fieldOpts:  t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f){ f._opts = t.value; renderFieldRows(); } },
  calMonth:   t=>{ calM = parseInt(t.value,10); calSelDay = null; renderCalPop(); },
  calYear:    t=>{ calY = parseInt(t.value,10); calSelDay = null; renderCalPop(); },
  logType:    t=>{ logFilter.type = t.value; updateLogTable(); },
  userRole:   t=>changeUserRole(t.dataset.id, t.value),
  importFile: t=>handleImportFile(t),
  itemFilePick: t=>onItemFilePick(t),
  finItemPick: t=>finItemPick(t)
};
document.addEventListener('change', e=>{
  const t = e.target.closest('[data-change]');
  if(!t) return;
  const fn = CHANGES[t.dataset.change];
  if(fn) fn(t);
});

const INPUTS = {
  globalSearch: t=>globalSearch(t.value),
  browseSearch: t=>{ browseState.q = t.value; updateBrowseTable(); },
  allSearch:    t=>{ allFilter.q = t.value; updateAllTable(); },
  logSearch:    t=>{ logFilter.q = t.value; updateLogTable(); },
  cartSearch:   t=>{ cartQ = t.value; renderCartResults(); },
  cartQty:      t=>cartSetQty(t.dataset.code, t.value),
  ceSubName:    t=>{ if(draftCat){ const s = draftCat.subs[parseInt(t.dataset.idx,10)]; if(s) s.name = t.value; } },
  fieldName:    t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f) f.name = t.value; },
  fieldOpts:    t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f) f._opts = t.value; }
};
document.addEventListener('input', e=>{
  const t = e.target.closest('[data-input]');
  if(!t) return;
  const fn = INPUTS[t.dataset.input];
  if(fn) fn(t);
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(el('confirmWrap').classList.contains('on'))      closeConfirm();
    else if(el('modalWrap').classList.contains('on'))   closeModal();
    else if(el('calPop').classList.contains('on'))      closeCalPop();
    return;
  }
  if(e.key==='Enter'){
    if(e.target.id==='loginUser'){ el('loginPass').focus(); return; }
    if(e.target.id==='loginPass'){ doLogin(); return; }
    if(e.target.id==='regPass'){ doRegister(); return; }
    if(e.target.id==='sName'){      // Enter v oknu podkategorije potrdi vnos
      const btn = el('modalBox').querySelector('[data-act="subSubmit"],[data-act="subRenameSave"]');
      if(btn) btn.click();
    }
  }
});

/* =====================================================================
   16. ZAGON APLIKACIJE
===================================================================== */
(async function init(){
  if(!sb){ el('loginErr').textContent = 'Strežnik Supabase ni dosegljiv (preveri URL in ključ).'; return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    try{ await afterAuth(); return; }
    catch(e){ console.error(e); }
  }
  el('loginUser').focus();
})();
</script>
