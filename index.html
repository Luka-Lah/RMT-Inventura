<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMT Inventura</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* =====================================================
   RMT INVENTURA — slog
   Paleta: borova zelenina, platno/bež, les, žerjavica
===================================================== */
:root{
  --pine:#1F3D2B;
  --pine-deep:#15291C;
  --moss:#3E6B4D;
  --canvas:#EFEAD9;
  --card:#FAF7EC;
  --wood:#8B5E3C;
  --wood-light:#B0805A;
  --ember:#C96F2E;
  --gold:#E5A83B;
  --ok:#3E7C4F;
  --warn:#C96F2E;
  --alert:#A93226;
  --ink:#23291F;
  --ink-soft:#5F6657;
  --line:#DCD5BF;
  --line-soft:#E8E2D0;
  --display:Georgia,'Iowan Old Style','Times New Roman',serif;
  --sans:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Consolas,monospace;
  --r:8px;
  --r-lg:12px;
  --shadow-sm:0 1px 3px rgba(35,41,31,.08);
  --shadow-md:0 6px 18px rgba(35,41,31,.16);
  --shadow-lg:0 18px 50px rgba(21,41,28,.38);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--sans);color:var(--ink);font-size:15px;line-height:1.45;
  /* subtilna platnena tekstura */
  background:
    repeating-linear-gradient(0deg, rgba(139,94,60,.03) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(31,61,43,.022) 0 1px, transparent 1px 3px),
    var(--canvas);
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
::selection{background:var(--moss);color:#fff}

/* ---------- "našita etiketa" — podpis aplikacije ---------- */
.tag{
  display:inline-block;font-family:var(--mono);font-size:12.5px;font-weight:600;
  letter-spacing:.06em;color:var(--pine);background:#fff;
  border:1.5px dashed var(--wood);border-radius:4px;padding:2px 8px;white-space:nowrap;
}

/* ---------- gumbi ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;border:none;border-radius:7px;
  padding:9px 16px;font-size:14px;font-weight:600;transition:filter .12s, transform .06s;
}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.btn-primary{background:var(--pine);color:#fff}
.btn-accent{background:var(--ember);color:#fff}
.btn-ghost{background:transparent;color:var(--pine);border:1px solid var(--pine)}
.btn-ghost:hover{background:rgba(31,61,43,.07);filter:none}
.btn-danger{background:var(--alert);color:#fff}
.btn-sm{padding:5px 11px;font-size:13px}
.btn-block{width:100%;justify-content:center}

/* ---------- prijava ---------- */
#loginScreen{
  position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1100px 560px at 78% -8%, #2C5440 0%, transparent 62%),
    var(--pine-deep);
  overflow:hidden;
}
#loginScreen .treeline{position:absolute;left:0;right:0;bottom:0;width:100%;height:150px;pointer-events:none}
.login-box{
  position:relative;width:min(390px,92vw);background:var(--card);border-radius:var(--r-lg);
  padding:34px 32px 26px;box-shadow:var(--shadow-lg);border-top:5px solid var(--wood);
}
.login-box::before{
  content:'';position:absolute;inset:8px;border:1.5px dashed rgba(139,94,60,.3);
  border-radius:8px;pointer-events:none;
}
.login-box .brand{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.login-box .logo{height:42px;width:auto;object-fit:contain}
.login-box h1{font-family:var(--display);font-size:27px;letter-spacing:.01em}
.login-box h1 span{color:var(--ember)}
.login-box .sub{color:var(--ink-soft);font-size:13px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{
  display:block;font-size:11.5px;font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;
}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;background:#fff;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:2px solid var(--moss);outline-offset:1px;border-color:var(--moss);
}
.login-err{color:var(--alert);font-size:13px;min-height:18px;margin-bottom:8px}
.login-hint{
  margin-top:18px;border-top:1px solid var(--line);padding-top:12px;
  font-size:12.5px;color:var(--ink-soft);line-height:1.65;
}
.login-hint code{font-family:var(--mono);background:var(--canvas);padding:1px 5px;border-radius:3px}

/* ---------- ogrodje ---------- */
#app{display:none;height:100%}
#app.on{display:flex;flex-direction:column}
.topbar{
  background:linear-gradient(180deg,#21402D,#1A3324);color:#fff;display:flex;align-items:center;gap:14px;
  padding:0 18px;height:58px;flex-shrink:0;border-bottom:4px solid var(--wood);
  box-shadow:0 2px 10px rgba(0,0,0,.22);
}
.topbar .logo{height:36px;width:auto;object-fit:contain}
.topbar h1{font-family:var(--display);font-size:19px;letter-spacing:.03em;font-weight:700}
.topbar h1 span{color:var(--gold);font-weight:400}
.topbar .spacer{flex:1}
.userchip{display:flex;align-items:center;gap:9px;font-size:13px}
.userchip .role{
  background:rgba(255,255,255,.16);border-radius:99px;padding:2px 10px;font-size:11px;
  letter-spacing:.08em;text-transform:uppercase;
}
.topbar .btn-ghost{color:#fff;border-color:rgba(255,255,255,.5)}
.topbar .btn-ghost:hover{background:rgba(255,255,255,.1)}
#menuBtn{display:none;background:transparent;border:none;color:#fff;font-size:24px;line-height:1;padding:4px}

.layout{display:flex;flex:1;min-height:0;position:relative}
.sidebar{
  width:250px;flex-shrink:0;background:var(--pine-deep);color:#E6EDE5;
  overflow-y:auto;padding:12px 0 28px;
}
.snav-label{
  font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#8DA893;
  padding:16px 18px 6px;
}
.snav button{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
  color:#E6EDE5;padding:9px 18px;font-size:14px;border-left:3px solid transparent;
}
.snav button:hover{background:rgba(255,255,255,.06)}
.snav button.active{background:var(--moss);border-left-color:var(--gold)}
.snav button:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}
.snav .badge{
  margin-left:auto;background:var(--alert);color:#fff;border-radius:99px;
  font-size:11px;font-weight:700;padding:1px 7px;
}
#sideBackdrop{display:none}

.main{flex:1;overflow-y:auto;padding:24px 28px 70px}
.crumbs{font-size:13px;color:var(--ink-soft);margin-bottom:14px}
.crumbs a{color:var(--pine);text-decoration:none;font-weight:600;cursor:pointer}
.crumbs a:hover{text-decoration:underline}
.view-title{font-family:var(--display);font-size:24px;margin-bottom:4px;letter-spacing:.01em}
.view-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:20px;max-width:680px}

/* ---------- opozorilo za zamude ---------- */
.banner-warn{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:#F6E2D8;border:1px solid var(--alert);border-left:5px solid var(--alert);
  border-radius:var(--r);padding:11px 14px;margin-bottom:18px;font-size:14px;
}
.banner-warn b{color:var(--alert)}
.banner-warn .btn{margin-left:auto}

/* ---------- kartice kategorij ---------- */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.catcard{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 16px 14px;
  cursor:pointer;transition:transform .1s,box-shadow .1s;position:relative;box-shadow:var(--shadow-sm);
}
.catcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.catcard .ico{font-size:28px;margin-bottom:8px}
.catcard h3{font-size:15.5px;margin-bottom:3px}
.catcard .meta{font-size:12.5px;color:var(--ink-soft)}
.catcard .outchip{
  position:absolute;top:12px;right:12px;background:var(--ember);color:#fff;
  font-size:11px;font-weight:700;border-radius:99px;padding:2px 8px;
}
.meter{height:5px;background:var(--line);border-radius:99px;margin-top:12px;overflow:hidden}
.meter i{display:block;height:100%;background:var(--ember)}

/* ---------- filtri (žetoni) ---------- */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chips .chips-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);min-width:74px}
.chip{
  border:1.5px solid var(--pine);background:var(--card);color:var(--pine);
  border-radius:99px;padding:6px 14px;font-size:13px;font-weight:600;
}
.chip:hover{background:#E5EDE3}
.chip.active{background:var(--pine);color:#fff}
.chip .cnt{opacity:.65;font-weight:400;margin-left:4px}
.chip-clear{border-color:var(--alert);color:var(--alert)}
.chip-clear:hover{background:#F6E2D8}
.chip-sm{padding:4px 11px;font-size:12.5px}

/* ---------- statistika ---------- */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.stat{
  background:var(--card);border:1px solid var(--line);border-left:4px solid var(--moss);
  border-radius:var(--r);padding:11px 18px;min-width:128px;box-shadow:var(--shadow-sm);
}
.stat b{display:block;font-size:23px;font-family:var(--mono)}
.stat span{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
.stat.s-ok{border-left-color:var(--ok)} .stat.s-ok b{color:var(--ok)}
.stat.s-warn{border-left-color:var(--ember)} .stat.s-warn b{color:var(--ember)}
.stat.s-alert{border-left-color:var(--alert)} .stat.s-alert b{color:var(--alert)}

/* ---------- tabela ---------- */
.toolrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolrow input[type=search]{
  flex:1;min-width:180px;max-width:360px;padding:8px 12px;border:1px solid var(--line);
  border-radius:7px;background:#fff;
}
.toolrow input[type=search]:focus{outline:2px solid var(--moss);outline-offset:1px}
.toolrow select{padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:13.5px}
.result-cnt{font-size:13px;color:var(--ink-soft);margin-left:auto}
.tablewrap{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  overflow:auto;max-height:72vh;box-shadow:var(--shadow-sm);
  -webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;
}
table{width:100%;border-collapse:collapse;font-size:14px}
th{
  position:sticky;top:0;z-index:2;background:var(--card);
  text-align:left;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);
  padding:11px 12px;white-space:nowrap;box-shadow:0 2px 0 var(--line);
}
th.th-sort{cursor:pointer;user-select:none}
th.th-sort:hover{color:var(--pine)}
th .arrow{font-size:10px;margin-left:3px}
td{padding:10px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
tbody tr:nth-child(even) td{background:rgba(139,94,60,.025)}
tr:last-child td{border-bottom:none}
tr.rowlink{cursor:pointer}
tr.rowlink:hover td{background:#F1EDDD}
.qtycell{font-family:var(--mono);font-size:13px;white-space:nowrap}
.pdfbadge{display:inline-flex;align-items:center;justify-content:center;font-size:13px;line-height:1;color:var(--wood);
  background:#F2E8D8;border:1px solid var(--line);border-radius:6px;padding:3px 6px;margin-left:6px;
  vertical-align:middle;white-space:nowrap;text-decoration:none;cursor:pointer;
  transition:background .12s,border-color .12s,transform .06s}
.pdfbadge:hover{background:var(--gold);border-color:var(--wood)}
.pdfbadge:active{transform:translateY(1px)}
.pdfbadge:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.more{
  display:inline-block;background:var(--line);border-radius:99px;padding:0 7px;
  font-size:11.5px;font-weight:700;color:var(--ink-soft);cursor:help;
}
.empty{padding:38px;text-align:center;color:var(--ink-soft)}

/* ---------- statusne značke ---------- */
.status{
  display:inline-flex;align-items:center;gap:6px;border-radius:99px;
  padding:2px 10px;font-size:12px;font-weight:600;white-space:nowrap;
}
.status::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.st-ok{background:#E0EEDF;color:#2F6B3E}
.st-part{background:#F7E7D0;color:#9A5B17}
.st-out{background:#F2DCD3;color:var(--alert)}
.st-late{background:var(--alert);color:#fff}
.overdue{color:var(--alert);font-weight:700}

/* ---------- vnosna polja v tabeli (prilagodljivi stolpci) ---------- */
.tentctl{
  font-size:12.5px;padding:4px 6px;border:1px solid var(--line);border-radius:5px;
  background:#fff;max-width:170px;
}
.tentnote{width:130px}
.tentdate{width:96px}
.tentchk{width:17px;height:17px;accent-color:var(--alert);cursor:pointer}
.tentmulti{
  display:block;width:160px;font-size:12.5px;padding:4px 8px;border:1px solid var(--line);
  border-radius:5px;background:#fff;text-align:left;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;cursor:pointer;color:var(--ink);
}
.tentmulti:hover{border-color:var(--pine);background:#F3F6F1}
.multilist{display:flex;flex-direction:column;gap:2px;max-height:48vh;overflow-y:auto;margin-bottom:4px}
.multiopt{display:flex;gap:10px;align-items:center;font-size:14px;padding:7px 10px;border-radius:6px;cursor:pointer}
.multiopt:hover{background:#EDE9DA}
.multiopt input{width:16px;height:16px;accent-color:var(--pine);flex-shrink:0}
.multiopt .optdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.18)}

/* ---------- barvne oznake vrednosti stolpcev ---------- */
.optpill{
  display:inline-block;border-radius:99px;padding:1px 9px;font-size:11.5px;font-weight:600;
  white-space:nowrap;line-height:1.55;
}
.optpill.neutral{background:var(--canvas);color:var(--ink);border:1px solid var(--line)}
.copt-lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-top:9px}
.copt{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.copt-name{font-size:12.5px;min-width:118px;font-weight:600}
.swatch{
  width:21px;height:21px;border-radius:50%;border:none;padding:0;cursor:pointer;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);
}
.swatch:hover{transform:scale(1.12)}
.swatch.sel{outline:2px solid var(--ink);outline-offset:1px}
.swatch-none{background:#fff;color:var(--ink-soft);font-size:12px;line-height:21px;text-align:center}

/* ---------- kartica predmeta ("našit obliž") ---------- */
.itemcard{
  position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-sm);
}
.itemcard::before{
  content:'';position:absolute;inset:7px;border:1.5px dashed rgba(139,94,60,.32);
  border-radius:8px;pointer-events:none;
}
.itemcard>*{position:relative}
.itemcard h3{font-family:var(--display);font-size:19px;margin:6px 0 2px}
.itemcard .sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:12px}
.card-late{
  background:#F6E2D8;border:1px solid var(--alert);border-radius:7px;color:var(--alert);
  font-size:13px;font-weight:600;padding:7px 11px;margin:10px 0 4px;
}
.qtyrow{display:flex;gap:10px;margin:12px 0 14px;flex-wrap:wrap}
.qtybox{border:1px solid var(--line);border-radius:var(--r);padding:8px 14px;text-align:center;background:#fff;min-width:86px}
.qtybox b{display:block;font-size:20px;font-family:var(--mono)}
.qtybox span{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft)}
.loanlist{margin:10px 0 14px;display:flex;flex-direction:column;gap:7px}
.loanrow{
  display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;border:1px solid var(--line);
  border-radius:var(--r);padding:9px 12px;background:#fff;font-size:13.5px;
}
.loanrow.late{border-color:var(--alert);background:#FBF0EA}
.loanrow .who{font-weight:700}
.loanrow .loanctl{margin-left:auto;display:flex;gap:7px;align-items:center;font-size:13px}
.loanrow .loanctl input{
  width:62px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;font-size:14px;
}

/* ---------- izposoja: razpoložljivost in hitri roki ---------- */
.availbar{
  display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
  border-radius:var(--r);padding:10px 14px;margin-bottom:14px;
}
.availbar b{font-family:var(--mono);font-size:24px;color:var(--ok)}
.availbar .lbl{font-size:13px;color:var(--ink-soft)}
.availbar .meter{flex:1;margin:0}
.qtystep{display:flex;align-items:center;gap:6px}
.qtystep button{
  width:32px;height:34px;border:1px solid var(--line);border-radius:7px;background:#fff;
  font-size:17px;font-weight:700;color:var(--pine);line-height:1;
}
.qtystep button:hover{border-color:var(--pine);background:#EFF3EC}
.qtystep input{width:64px;text-align:center;padding:7px 4px;border:1px solid var(--line);border-radius:7px}
.duechips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.whobox{
  background:var(--canvas);border:1px solid var(--line);border-radius:var(--r);
  padding:10px 12px;font-weight:600;color:var(--ink);line-height:1.45;
}

/* ---------- skupinska izposoja (košarica) ---------- */
.cart-cols{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.cart-pick{flex:1;min-width:280px}
.cart-side{flex:1;min-width:280px}
.cart-list{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  max-height:48vh;overflow-y:auto;box-shadow:var(--shadow-sm);
}
.cart-pickrow{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line-soft);font-size:14px;
}
.cart-pickrow:last-child{border-bottom:none}
.cart-pickrow .nm{flex:1;min-width:0}
.cart-pickrow .av{font-family:var(--mono);font-size:12.5px;color:var(--ok);white-space:nowrap}
.cart-pickrow.inbasket{opacity:.55}
.cart-basket{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:6px;margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.cart-row{
  display:flex;align-items:center;gap:10px;padding:8px 8px;border-bottom:1px solid var(--line-soft);font-size:14px;
}
.cart-row:last-child{border-bottom:none}
.cart-row .nm{flex:1;min-width:0}
.cart-row .nm small{display:block;color:var(--ink-soft);font-size:12px}
.cart-row .qtystep input{width:54px}
.cart-row .rm{border:none;background:none;color:var(--alert);font-size:19px;font-weight:bold;cursor:pointer;padding:0 4px;line-height:1}
.cart-sum{font-size:13px;color:var(--ink-soft);padding:8px 10px}

/* ---------- modalna okna ---------- */
#modalWrap{
  position:fixed;inset:0;background:rgba(21,41,28,.58);display:none;
  align-items:center;justify-content:center;z-index:150;padding:18px;
}
#modalWrap.on{display:flex}
.modal{
  background:var(--card);border-radius:var(--r-lg);width:min(540px,100%);padding:24px;
  box-shadow:var(--shadow-lg);border-top:5px solid var(--pine);max-height:90vh;overflow-y:auto;
}
.modal h3{font-family:var(--display);font-size:19px;margin-bottom:14px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.modal .hint{color:var(--ink-soft);font-size:13px;margin:-6px 0 14px}
.fieldrow{display:flex;gap:12px}
.fieldrow .field{flex:1}
.emojirow{display:flex;gap:6px;flex-wrap:wrap;margin:-4px 0 12px}
.emojibtn{font-size:19px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:3px 7px;line-height:1.3}
.emojibtn:hover{border-color:var(--pine);background:#E5EDE3}

/* ---------- urejevalnik stolpcev ---------- */
.frow{border:1px solid var(--line);border-radius:7px;padding:8px;margin-bottom:7px;background:#fff}
.frow-top{display:flex;gap:7px;align-items:center}

<script>
'use strict';
/* =====================================================================
   RMT INVENTURA — različica za Supabase (prava večuporabniška spletna stran)

   Prijava in računi: Supabase Auth + tabela "profiles" (ime, priimek, vloga).
   Skupni podatki aplikacije: en zapis v tabeli "appstate" (id = 1), polje
   "data" (jsonb) vsebuje {categories, inventory, log}.
   Pravila dostopa (RLS) zahtevajo prijavo; pisanje vsebine je dovoljeno
   prijavljenim, urejanje profilov pa adminom (glej priloženi SQL).

   --> Pred uporabo vpiši svoj Project URL in publishable (anon) ključ: <--
===================================================================== */
const SB_URL = 'https://rhgdkvgetbvkydhhlkcg.supabase.co';
const SB_KEY = 'sb_publishable_b_oLSIGfi8xTfa734Km9xg__8VRVFL6';
let sb = null;
try{ sb = supabase.createClient(SB_URL, SB_KEY); }catch(e){ console.error('Supabase SDK ni naložen', e); }
let persistTimer = null;

function mapProfile(p){
  if(!p) return null;
  return { id:p.id, username:p.email||'', email:p.email||'',
    firstName:p.first_name||'', lastName:p.last_name||'',
    address:p.address||'', zip:p.zip||'', city:p.city||'', phone:p.phone||'',
    role:(p.role==='admin'?'admin':'user') };
}
async function dbLoadUsers(){
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending:true });
  if(error){ console.error(error); users = []; return; }
  users = (data||[]).map(mapProfile);
}
async function dbLoadState(){
  const { data, error } = await sb.from('appstate').select('data').eq('id', 1).maybeSingle();
  if(error) console.error(error);
  if(data && data.data && Array.isArray(data.data.categories)){
    categories = data.data.categories;
    inventory  = Array.isArray(data.data.inventory) ? data.data.inventory : [];
    log        = Array.isArray(data.data.log) ? data.data.log : [];
    finance    = normalizeFinance(data.data.finance);
    migrateData();
  } else {
    categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    inventory  = JSON.parse(JSON.stringify(DEFAULT_INVENTORY));
    log = [];
    finance = normalizeFinance(null);
    migrateData();
    await sb.from('appstate').upsert({ id:1, data:{ categories, inventory, log, finance } });
  }
}
async function afterAuth(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return;
  await dbLoadUsers();
  currentUser = users.find(u=>u.id===user.id) ||
    { id:user.id, username:user.email, email:user.email, firstName:'', lastName:'', role:'user' };
  await dbLoadState();
  el('loginErr').textContent = '';
  if(el('loginErr2')) el('loginErr2').textContent = '';
  el('loginPass').value = '';
  enterApp();
  startRealtime();
}
/* razumljivo sporočilo iz napake Supabase */
function sbErr(error, fallback){
  return (error && error.message) ? error.message : fallback;
}

/* =====================================================================
   SPROTNO OSVEŽEVANJE (Supabase Realtime)
   Naročimo se na spremembe skupnega zapisa appstate. Ko ga kdo posodobi,
   ostali takoj dobijo novo stanje in osvežijo prikaz. Osveževanje se odloži,
   dokler je odprto okno (izposoja, urejanje, potrditev), da ne povozi vnosa.
===================================================================== */
let rtChannel = null;
let pendingRemote = null;

function uiBusy(){
  return (el('modalWrap')   && el('modalWrap').classList.contains('on')) ||
         (el('confirmWrap') && el('confirmWrap').classList.contains('on'));
}
function startRealtime(){
  if(!sb || rtChannel) return;
  try{
    rtChannel = sb.channel('rmt-appstate')
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'appstate' }, payload=>{
        const d = payload && payload.new && payload.new.data;
        if(!d) return;
        /* preskoči lasten zapis (vsebina je enaka trenutni) */
        try{
          if(JSON.stringify({ categories, inventory, log, finance }) ===
             JSON.stringify({ categories:d.categories, inventory:d.inventory, log:d.log, finance:normalizeFinance(d.finance) })) return;
        }catch(_e){}
        if(uiBusy()){ pendingRemote = d; return; }   // ne moti odprtega okna
        applyRemoteState(d);
      })
      .subscribe();

/* Migracija starih zapisov:
   - vsaka kategorija dobi seznam stolpcev (šotori privzete popisne stolpce),
   - stari šotorski popisi (item.tent) se preselijo v item.custom,
   - vsak predmet ima zagotovljena polja loans in custom. */
function migrateData(){
  let changed = false;
  for(const c of categories){
    if(!Array.isArray(c.fields)){
      c.fields = (c.id === 'sotori') ? tentFieldDefs() : [];
      changed = true;
    }
    if(!Array.isArray(c.subcats)){ c.subcats = []; changed = true; }
    /* obstoječi šotorski stolpec Servis dobi privzete barve (enkratno; uporabnikove
       kasnejše spremembe barv ostanejo, ker je polje colors potem vedno zapisano) */
    for(const f of c.fields){
      if(f.id==='tf_service' && f.type==='select' && f.colors === undefined){
        f.colors = Object.assign({}, TENT_SERVICE_COLORS);
        changed = true;
      }
    }
  }
  for(const i of inventory){
    if(!Array.isArray(i.loans)){ i.loans = []; changed = true; }
    if(!i.custom){ i.custom = {}; changed = true; }
    if(i.tent){
      const t = i.tent;
      const roof  = Array.isArray(t.roof)  ? t.roof  : (t.roof  ? [t.roof]  : []);
      const floor = Array.isArray(t.floor) ? t.floor : (t.floor ? [t.floor] : []);
      i.custom.tf_repair  = !!t.repair;
      i.custom.tf_roof    = roof;
      i.custom.tf_floor   = floor;
      i.custom.tf_service = t.service || '';
      i.custom.tf_date    = t.date || '';
      i.custom.tf_notes   = t.notes || '';
      delete i.tent;
      changed = true;
    }
  }
  /* uporabniki na Supabase različici prihajajo iz tabele profiles, lokalnega sejanja ni */
  if(changed) saveData();
}

function ensureUsers(){
  let changed = false;
  if(!Array.isArray(users) || !users.length){
    users = JSON.parse(JSON.stringify(DEFAULT_USERS));

  }
  for(const def of DEFAULT_USERS){

  }
  for(const u of users){               // dopolni morebitna manjkajoča polja starih zapisov
    if(!u.id){ u.id = 'u_' + Math.random().toString(36).slice(2,9); changed = true; }

    if(u.lastName === undefined){ u.lastName = ''; changed = true; }
    if(u.email === undefined){ u.email = ''; changed = true; }
    if(u.role === undefined){ u.role = 'user'; changed = true; }
  }
  return changed;
}

===================================================================== */
/* esc() poskrbi, da uporabniški vnos nikoli ne postane HTML (zaščita pred XSS) */
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function el(id){ return document.getElementById(id); }

function todayISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function plusDaysISO(n){
  const d = new Date(); d.setDate(d.getDate()+n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(iso){
  if(!iso) return '—';
  const p = String(iso).split('-');
  if(p.length !== 3) return esc(iso);
  return p[2] + '. ' + p[1] + '. ' + p[0];
}
/* Razčleni ročno vpisan datum: "15. 6. 2026", "15.6.26" ali "2026-06-15" -> ISO.
   Vrne '' za prazno polje in null za neveljaven vnos. */
function parseDateInput(s){
  s = String(s||'').trim();
  if(!s) return '';
  let d, mo, y;
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m){ y = +m[1]; mo = +m[2]; d = +m[3]; }
  else{
    m = s.match(/^(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{2,4})\.?$/);
    if(!m) return null;
    d = +m[1]; mo = +m[2]; y = +m[3];
    if(y < 100) y += 2000;
  }
  if(y < 1990 || y > 2100) return null;
  const dt = new Date(y, mo-1, d);
  if(dt.getFullYear() !== y || dt.getMonth() !== mo-1 || dt.getDate() !== d) return null;
  return y + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}
function fmtDateInput(iso){
  if(!iso) return '';
  const p = String(iso).split('-');
  if(p.length !== 3) return '';
  return (+p[2]) + '. ' + (+p[1]) + '. ' + p[0];
}

function isOverdue(loan){ return !!(loan.until && loan.until < todayISO()); }
function borrowedQty(item){ return (item.loans||[]).reduce((s,l)=>s+l.qty,0); }
function availQty(item){ return item.qty - borrowedQty(item); }
function itemHasOverdue(item){ return (item.loans||[]).some(isOverdue); }
/* Status predmeta — zamuda ima prednost, da je vizualno takoj opazna */
function itemStatus(item){
  if(itemHasOverdue(item)) return { cls:'st-late', txt:'Zamuda ⚠', rank:3 };
  const b = borrowedQty(item);
  if(b === 0)        return { cls:'st-ok',   txt:'Na voljo',          rank:0 };
  if(b < item.qty)   return { cls:'st-part', txt:'Delno izposojeno',  rank:1 };
  return { cls:'st-out', txt:'Vse izposojeno', rank:2 };
}
function overdueLoanCount(){
  return inventory.reduce((s,i)=>s+(i.loans||[]).filter(isOverdue).length, 0);
}
function catById(id){ return categories.find(c=>c.id===id); }

  if(loan.email && currentUser.email && loan.email.toLowerCase() === currentUser.email.toLowerCase()) return true;

function catFields(catId){

function customVal(item, f){
  if(!item.custom) item.custom = {};
  let v = item.custom[f.id];
  if(f.type==='multiselect' && !Array.isArray(v)){ v = v ? [v] : []; item.custom[f.id] = v; }
  return v;
}
function fmtCustom(f, v){
  if(f.type==='multiselect') return (v && v.length) ? v.join(', ') : '—';
  if(f.type==='checkbox')    return v ? '✔' : '—';
  if(f.type==='date')        return v ? fmtDate(v) : '—';
  return (v !== undefined && v !== null && v !== '') ? String(v) : '—';
}
/* barva, dodeljena izbrani možnosti stolpca (ali null) */
function optColor(f, value){
  return (f && f.colors && value && f.colors[value]) ? f.colors[value] : null;
}
/* črna ali bela pisava glede na svetlost ozadja značke */
function pillTextColor(hex){
  const m = /^#?([0-9a-f]{6})$/i.exec(String(hex||''));
  if(!m) return '#fff';
  const n = parseInt(m[1], 16);
  const lum = 0.299*(n>>16 & 255) + 0.587*(n>>8 & 255) + 0.114*(n & 255);
  return lum > 150 ? '#23291F' : '#fff';
}
function optPillHTML(f, value){
  const c = optColor(f, value);
  if(c) return '<span class="optpill" style="background:' + esc(c) + ';color:' + pillTextColor(c) + '">' + esc(value) + '</span>';
  return '<span class="optpill neutral">' + esc(value) + '</span>';
}
/* prikaz vrednosti stolpca samo za branje; pri seznamih z barvami kot barvne značke */
function customDisplayHTML(f, v){
  const hasColors = f.colors && Object.keys(f.colors).length;
  if(f.type==='select' && v && hasColors) return optPillHTML(f, v);
  if(f.type==='multiselect' && Array.isArray(v) && v.length && hasColors){
    return v.map(o=>optPillHTML(f, o)).join(' ');
  }
  return esc(fmtCustom(f, v));
}

    }
    return h + '</select></td>';
  }
  if(f.type==='multiselect'){
    const lbl = fmtCustom(f, v);
    const hasColors = f.colors && Object.keys(f.colors).length;
    const inner = (hasColors && Array.isArray(v) && v.length) ? v.map(o=>optPillHTML(f, o)).join(' ') : esc(lbl);
    return '<td><button class="tentmulti" data-act="multiField"' + idA + ' title="' + esc(lbl) + '">' + inner + '</button></td>';
  }
  if(f.type==='date'){
    return '<td><input type="text" class="tentctl tentdate" data-change="customDate"' + idA +
      ' value="' + esc(fmtDateInput(v||'')) + '" placeholder="d. m. llll"></td>';
  }
  if(f.type==='number'){
    return '<td><input type="number" class="tentctl" style="width:80px" data-change="customTxt"' + idA + ' value="' + esc(v??'') + '"></td>';
  }
  return '<td><input type="text" class="tentctl tentnote" data-change="customTxt"' + idA + ' value="' + esc(v||'') + '" placeholder="…"></td>';
}
/* okno z več izbirami (npr. popis strehe/podna) */
function openMultiField(itemId, fieldId){
  const item = itemByCode(itemId);
  if(!item || !isAdmin()) return;
  const f = catFields(item.cat).find(x=>x.id===fieldId);
  if(!f) return;
  const cur = customVal(item, f);
  let h = '<h3>' + esc(f.name) + ' — ' + esc(item.name) + ' <span class="tag">' + esc(item.id) + '</span></h3>' +

    ((f.options||[]).includes('OK') ? ' Izbira »OK« izključi ostale.' : '') + '</div>' +
    '<div class="multilist">';
  for(const o of (f.options||[])){
    const oc = optColor(f, o);
    h += '<label class="multiopt"><input type="checkbox" class="tmchk" data-change="multiChk" value="' + esc(o) + '"' +
      (cur.includes(o)?' checked':'') + '>' +
      (oc ? '<span class="optdot" style="background:' + esc(oc) + '"></span>' : '') +
      '<span>' + esc(o) + '</span></label>';
  }
  h += '</div><div class="actions">' +
    '<button class="btn btn-ghost" data-act="modalClose">Prekliči</button>' +
    '<button class="btn btn-primary" data-act="multiSave" data-id="' + esc(item.id) + '" data-fid="' + esc(f.id) + '">Shrani</button>' +
    '</div>';
  openModal(h);
}
/* pravilo: »OK« izključi vse ostale možnosti in obratno */
function multiExclusive(chk){
  if(!chk.checked) return;
  const all = document.querySelectorAll('.tmchk');
  if(chk.value === 'OK'){
    all.forEach(c => { if(c !== chk) c.checked = false; });
  } else {
    all.forEach(c => { if(c.value === 'OK') c.checked = false; });
  }
}
function saveMultiField(itemId, fieldId){
  const item = itemByCode(itemId);
  if(!item) return;
  if(!item.custom) item.custom = {};
  item.custom[fieldId] = Array.from(document.querySelectorAll('.tmchk:checked')).map(c=>c.value);
  saveData();
  closeModal();
  switchView(activeNav);
  toast('Shranjeno.');
}

   6. PRIJAVA IN VLOGE
===================================================================== */
async function doLogin(){
  if(!sb){ el('loginErr').textContent = 'Strežnik ni dosegljiv.'; return; }
  const email = el('loginUser').value.trim();
  const p = el('loginPass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password:p });
  if(error){ el('loginErr').textContent = 'Napačen e-mail ali geslo.'; return; }
  await afterAuth();
}
function showRegister(on){
  el('loginForm').style.display = on ? 'none' : '';
  el('registerForm').style.display = on ? '' : 'none';
  el('loginErr').textContent = '';
  el('loginErr2').textContent = '';
  if(on){ el('regFirst').focus(); }
  else  { el('loginUser').focus(); }
}
async function doRegister(){
  if(!sb){ el('loginErr2').textContent = 'Strežnik ni dosegljiv.'; return; }
  const first = el('regFirst').value.trim();
  const last  = el('regLast').value.trim();
  const address = el('regAddress').value.trim();
  const zip   = el('regZip').value.trim();
  const city  = el('regCity').value.trim();
  const email = el('regEmail').value.trim();
  const pass  = el('regPass').value;
  if(!first || !last){ el('loginErr2').textContent = 'Vpiši ime in priimek.'; return; }
  if(!address){ el('loginErr2').textContent = 'Vpiši naslov bivanja.'; return; }
  if(!/^\d{4}$/.test(zip)){ el('loginErr2').textContent = 'Poštna številka naj bo 4-mestna (npr. 1000).'; return; }
  if(!city){ el('loginErr2').textContent = 'Vpiši pošto (kraj).'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ el('loginErr2').textContent = 'Vpiši veljaven e-mail naslov.'; return; }
  if(pass.length < 6){ el('loginErr2').textContent = 'Geslo naj ima vsaj 6 znakov.'; return; }
  /* nov uporabnik dobi vlogo "tabornik"; admina dodeli obstoječi admin ali se nastavi v Supabase */
  const { data, error } = await sb.auth.signUp({
    email, password:pass,
    options:{ data:{ first_name:first, last_name:last, address, zip, city } }
  });
  if(error){ el('loginErr2').textContent = sbErr(error, 'Registracija ni uspela.'); return; }
  if(!data.session){
    /* vklopljena je potrditev e-maila */
    el('loginErr2').textContent = 'Račun je ustvarjen. Potrdi e-mail in se nato prijavi.';
    showRegister(false);
    return;
  }
  ['regFirst','regLast','regAddress','regZip','regCity','regEmail','regPass'].forEach(id=>{ el(id).value=''; });
  await afterAuth();
}
async function doLogout(){
  stopRealtime();
  if(sb) await sb.auth.signOut();
  currentUser = null;
  el('app').classList.remove('on');
  el('loginScreen').style.display = 'flex';
  showRegister(false);
  el('loginUser').focus();
}
function enterApp(){
  el('loginScreen').style.display = 'none';
  el('app').classList.add('on');
  el('userName').textContent = userDisplay(currentUser);
  el('userRole').textContent = isAdmin() ? 'admin' : 'uporabnik';
  buildSidebar();
  updateFab();
  switchView('all');
}

        '<span>' + l.qty + ' kos' + (l.qty===1?'':'ov') + '</span>' +
        '<span>od ' + fmtDate(l.from) + '</span>' +
        '<span class="' + (isOverdue(l)?'overdue':'') + '">do ' + fmtDate(l.until) + (isOverdue(l)?' ⚠ ZAMUDA':'') + '</span>' +
        (l.note?'<span style="color:var(--ink-soft)">('+esc(l.note)+')</span>':'') +

      if(has) lines.push('<br>' + esc(f.name) + ': ' + (f.type==='checkbox' ? '<span class="overdue">✔ da</span>' : customDisplayHTML(f, v)));
    }

        '<b>Podatki kategorije</b>' + lines.join('') + '</div>';

  if(isAdmin()) h += '<button class="btn btn-ghost" data-act="itemEdit" data-id="' + esc(item.id) + '">Uredi</button>';
  h += '</div></div>';
  return h;

/* ---------- skupna tabela predmetov ---------- */
function sortItems(items){
  if(!tableSort.key) return items;
  const k = tableSort.key, d = tableSort.dir;
  const val = i => {
    if(k==='id')     return String(i.id);
    if(k==='name')   return String(i.name);
    if(k==='cat'){ const c = catById(i.cat); return c ? c.name : ''; }
    if(k==='qty')    return availQty(i);
    if(k==='status') return itemStatus(i).rank;
    return '';
  };
  return items.slice().sort((a,b)=>{
    const va = val(a), vb = val(b);
    if(typeof va === 'number') return (va - vb) * d;
    return String(va).localeCompare(String(vb), 'sl') * d;
  });
}
function thSort(key, label, sortable){
  if(!sortable) return '<th>' + label + '</th>';
  const arrow = tableSort.key===key ? '<span class="arrow">' + (tableSort.dir===1?'▲':'▼') + '</span>' : '';
  return '<th class="th-sort" data-act="sort" data-key="' + key + '" title="Razvrsti">' + label + arrow + '</th>';
}
function loansCellHTML(i){
  const ls = i.loans||[];
  if(!ls.length) return '—';
  const full = ls.map(l=>whoText(l)+' ('+l.qty+')').join(', ');
  let h = ls.slice(0,2).map(l =>
    whoHTML(l) + ' (' + l.qty + (isOverdue(l)?' <span class="overdue">⚠</span>':'') + ')').join('<br>');
  if(ls.length>2) h += ' <span class="more" title="' + esc(full) + '">+' + (ls.length-2) + '</span>';
  return h;
}
function itemsTableHTML(items, opts){
  opts = opts || {};
  if(!items.length) return '<div class="tablewrap"><div class="empty">Ni predmetov, ki bi ustrezali filtrom.</div></div>';
  const fields = opts.fields || [];
  const so = !!opts.sortable;
  let h = '<div class="tablewrap"><table><thead><tr>' +
    thSort('id','Koda',so) + thSort('name','Predmet',so) +
    (opts.showCat ? thSort('cat','Kategorija',so) : '') +
    thSort('qty','Na voljo',so) + thSort('status','Status',so) +
    '<th>Izposojeno pri</th>' +
    fields.map(f=>'<th>' + esc(f.name) + '</th>').join('') +
    '</tr></thead><tbody>';
  for(const i of items){
    const st = itemStatus(i);
    const pdfs = (i.files||[]).map(f =>
      '<a class="pdfbadge" href="' + esc(fileUrl(f.path)) + '" target="_blank" rel="noopener"' +
        ' title="Odpri: ' + esc(f.name) + '" aria-label="Odpri PDF ' + esc(f.name) + '">📄</a>').join('');
    h += '<tr class="rowlink" data-id="' + esc(i.id) + '" title="Klikni za podrobnosti">' +
      '<td><span class="tag">' + esc(i.id) + '</span></td>' +
      '<td>' + esc(i.name) + (pdfs ? ' ' + pdfs : '') + '</td>';
    if(opts.showCat){
      const c = catById(i.cat);
      h += '<td style="font-size:13px;white-space:nowrap">' + (c?esc(c.icon)+' '+esc(c.name):'—') +
        (i.subcat?'<br><span style="color:var(--ink-soft);font-size:12px">' + esc(i.subcat) + '</span>':'') + '</td>';
    }

/* ---------- VSA OPREMA — celoten inventar s filtri in razvrščanjem ---------- */
function applyAllFilter(){
  return inventory.filter(i=>{
    if(allFilter.cat && i.cat !== allFilter.cat) return false;
    if(allFilter.sub && i.subcat !== allFilter.sub) return false;
    if(allFilter.status){
      const b = borrowedQty(i);
      if(allFilter.status==='ok'      && b !== 0) return false;
      if(allFilter.status==='part'    && !(b>0 && b<i.qty)) return false;
      if(allFilter.status==='out'     && b !== i.qty) return false;
      if(allFilter.status==='overdue' && !itemHasOverdue(i)) return false;
    }
    if(allFilter.q){
      const q = allFilter.q.toLowerCase();
      if(!(i.name.toLowerCase().includes(q) || String(i.id).toLowerCase().includes(q) ||
           (i.subcat||'').toLowerCase().includes(q))) return false;
    }
    return true;
  });
}
function updateAllTable(){
  const items = applyAllFilter();
  el('tableHost').innerHTML = itemsTableHTML(sortItems(items), { showCat:true, sortable:true });
  const cnt = document.querySelector('.result-cnt');
  if(cnt) cnt.textContent = items.length + ' predmetov';
  const ch = el('allClearChip');
  if(ch) ch.style.display = (allFilter.cat || allFilter.status || allFilter.q) ? '' : 'none';
}

  const out = items.reduce((s,i)=>s+borrowedQty(i),0);

  let catChips = '<div class="chips"><span class="chips-label">Kategorija</span>' +
    '<button class="chip chip-sm' + (!allFilter.cat?' active':'') + '" data-act="allCat">Vse' +

  for(const c of categories){

    if(!cnt) continue;

      esc(c.icon) + ' ' + esc(c.name) + '<span class="cnt">' + cnt + '</span></button>';

    if(withItems.length){

        '<button class="chip chip-sm' + (!allFilter.sub?' active':'') + '" data-act="allSub">Vse</button>';
      for(const s of withItems){

          esc(s) + '<span class="cnt">' + cnt + '</span></button>';

      subChips += '</div>';

  let stChips = '<div class="chips" style="margin-top:-4px"><span class="chips-label">Status</span>' +

      '<div class="stat"><b>' + items.length + '</b><span>Predmetov</span></div>' +
      '<div class="stat"><b>' + total + '</b><span>Vseh kosov</span></div>' +
      '<div class="stat s-ok"><b>' + (total-out) + '</b><span>Na voljo</span></div>' +
      '<div class="stat s-warn"><b>' + out + '</b><span>Izposojeno</span></div>' +
      (lateCnt?'<div class="stat s-alert"><b>' + lateCnt + '</b><span>Z zamudo</span></div>':'') +

function submitBorrow(id){
  const item = itemByCode(id);
  if(!item) return;
  if(!currentUser){ toast('Najprej se prijavi.'); return; }
  /* admin lahko izbere izposojevalca; ostali se izposodijo nase */
  let u = currentUser;
  if(isAdmin() && el('bWho')){
    u = userById(el('bWho').value);
    if(!u){ toast('Izberi uporabnika.'); return; }
  }
  const qty = parseInt(el('bQty').value, 10);
  const until = el('bUntil').value;
  const note = el('bNote').value.trim();
  const av = availQty(item);
  if(!qty || qty<1 || qty>av){ toast('Količina mora biti med 1 in ' + av + '.'); return; }
  if(!until){ toast('Izberi datum vračila.'); return; }
  const who = userDisplay(u);
  item.loans.push({ borrower:who, email:u.email, borrowerId:u.id, qty, from:todayISO(), until, note });
  log.unshift({ type:'borrow', code:item.id, name:item.name, borrower:who, email:u.email, borrowerId:u.id, qty, until, time:new Date().toLocaleString('sl-SI') });
  saveData();
  closeModal();
  toast('Izposojeno: ' + qty + ' × ' + item.name + ' → ' + who);
  refreshCurrent(item.id);
}
function openReturnModal(id){
  const item = itemByCode(id);
  if(!item || !item.loans.length){ toast('Ta predmet nima odprtih izposoj.'); return; }
  const anyMine = item.loans.some(canReturn);
  let h = '<h3>Vračilo — ' + esc(item.name) + ' <span class="tag">' + esc(item.id) + '</span></h3>' +
    '<div class="hint">' + (isAdmin()
      ? 'Kot gospodar opreme lahko vrneš katero koli izposojo. Vpiši, koliko kosov se vrača (lahko celoto ali del).'
      : 'Vrneš lahko le opremo, ki si si jo izposodil. Vpiši, koliko kosov vračaš (celoto ali del).') + '</div>';
  item.loans.forEach((l,idx)=>{
    const mine = canReturn(l);
    h += '<div class="loanrow' + (isOverdue(l)?' late':'') + '" style="margin-bottom:8px">' +
      '<span class="who">' + whoHTML(l) + '</span>' +
      '<span>' + l.qty + ' kos' + (l.qty===1?'':'ov') + '</span>' +
      '<span class="' + (isOverdue(l)?'overdue':'') + '">do ' + fmtDate(l.until) + (isOverdue(l)?' ⚠ ZAMUDA':'') + '</span>' +
      (mine
        ? '<span class="loanctl">Vrne:' +
            '<input id="rQty' + idx + '" type="number" min="1" max="' + l.qty + '" value="' + l.qty + '">' +
            '<button class="btn btn-primary btn-sm" data-act="returnSave" data-id="' + esc(item.id) + '" data-idx="' + idx + '">↩ Vrni</button>' +
          '</span>'
        : '<span style="color:var(--ink-soft);font-size:12.5px">vrne lahko le izposojevalec ali gospodar opreme</span>') +
      '</div>';
  });
  /* če je predmet del skupinske izposoje, ponudi vračilo cele skupine naenkrat
     (le če lahko vračaš to izposojo) */
  const gids = [...new Set(item.loans.filter(l=>l.gid).map(l=>l.gid))];
  for(const gid of gids){
    const sib = loansByGid(gid);
    const itemCount = new Set(sib.map(s=>s.item.id)).size;
    if(itemCount < 2) continue;
    if(!sib.some(s=>canReturn(s.loan))) continue;
    const totalQty = sib.reduce((s,x)=>s+x.loan.qty, 0);
    h += '<div class="loanrow" style="margin-bottom:8px;border-color:var(--ember);background:#FBF1E8;flex-direction:column;align-items:stretch;gap:8px">' +
      '<div><b>Skupinska izposoja</b> — ' + whoHTML(sib[0].loan) + ': ' + itemCount + ' predmetov, ' + totalQty + ' kosov</div>' +
      '<button class="btn btn-accent btn-sm" style="align-self:flex-start" data-act="returnGroup" data-gid="' + esc(gid) + '">↩ Vrni celotno skupino</button>' +
    '</div>';
  }
  /* vračilo vsega, kar je posamezen uporabnik izposodil (po vsem inventarju) */
  const seen = new Set();
  for(const l of item.loans){
    const key = l.borrowerId || (l.email||'').toLowerCase() || l.borrower;
    if(!key || seen.has(key)) continue;
    seen.add(key);
    if(!canReturn(l)) continue;
    const all = loansByBorrowerRef(l);
    const itemCount = new Set(all.map(s=>s.item.id)).size;
    if(itemCount < 2) continue;                 // smiselno le, če ima izposojeno več predmetov
    const totalQty = all.reduce((s,x)=>s+x.loan.qty, 0);
    h += '<div class="loanrow" style="margin-bottom:8px;border-color:var(--pine);background:#EEF3EC;flex-direction:column;align-items:stretch;gap:8px">' +
      '<div><b>Vse, kar je ' + esc(l.borrower) + ' izposodil(a)</b>: ' + itemCount + ' predmetov, ' + totalQty + ' kosov</div>' +
      '<button class="btn btn-accent btn-sm" style="align-self:flex-start" data-act="returnAllUser" data-id="' + esc(item.id) + '" data-bid="' + esc(l.borrowerId||'') + '" data-bemail="' + esc(l.email||'') + '">↩ Vrni vse od te osebe</button>' +
    '</div>';
  }
  if(!anyMine && !isAdmin()){
    h += '<div class="hint" style="color:var(--alert)">Te opreme nimaš izposojene, zato je ne moreš vrniti.</div>';
  }
  h += '<div class="actions"><button class="btn btn-ghost" data-act="modalClose">Zapri</button></div>';
  openModal(h);
}
/* vse odprte izposoje z dano oznako skupine (par predmet + izposoja) */
function loansByGid(gid){
  const out = [];
  for(const it of inventory) for(const l of (it.loans||[])) if(l.gid === gid) out.push({ item:it, loan:l });
  return out;
}
/* vse odprte izposoje istega izposojevalca po vsem inventarju (ujemanje po id ali e-mailu) */
function loansByBorrowerRef(ref){
  const bid = ref.borrowerId || '';
  const email = (ref.email || '').toLowerCase();
  const out = [];
  for(const it of inventory) for(const l of (it.loans||[])){
    if((bid && l.borrowerId === bid) || (email && (l.email||'').toLowerCase() === email)) out.push({ item:it, loan:l });
  }
  return out;
}
/* vrne vse, kar je posamezen uporabnik izposodil (po vsem inventarju), naenkrat */
function returnAllForUser(bid, email){
  const ref = { borrowerId:bid, email:email };
  const all = loansByBorrowerRef(ref);
  if(!all.length){ toast('Ta oseba nima odprtih izposoj.'); return; }
  if(!canReturn(ref)){ toast('To lahko stori le ta oseba ali gospodar opreme.'); return; }
  const rgid = 'R' + Date.now();
  const time = new Date().toLocaleString('sl-SI');
  const who = all[0].loan.borrower;
  for(const { item, loan } of all){
    log.unshift({ type:'return', code:item.id, name:item.name, borrower:loan.borrower, email:loan.email, borrowerId:loan.borrowerId, qty:loan.qty, time, gid:rgid });
  }
  for(const it of inventory) it.loans = (it.loans||[]).filter(l =>
    !((bid && l.borrowerId === bid) || (email && (l.email||'').toLowerCase() === email.toLowerCase())));
  const n = new Set(all.map(s=>s.item.id)).size;
  saveData();
  closeModal();
  toast('Vrnjeno vse od osebe ' + who + ': ' + n + ' predmetov.');
  refreshCurrent();
}
function submitReturn(id, idx){
  const item = itemByCode(id);
  if(!item || !item.loans[idx]) return;
  const l = item.loans[idx];
  if(!canReturn(l)){ toast('To opremo lahko vrne le izposojevalec ali gospodar opreme.'); return; }
  const q = parseInt(el('rQty'+idx).value, 10);
  if(!q || q<1 || q>l.qty){ toast('Količina mora biti med 1 in ' + l.qty + '.'); return; }
  l.qty -= q;                              // delno vračilo zmanjša količino, celotno odstrani izposojo
  const who = l.borrower;
  if(l.qty===0) item.loans.splice(idx,1);
  log.unshift({ type:'return', code:item.id, name:item.name, borrower:who, email:l.email, borrowerId:l.borrowerId, qty:q, time:new Date().toLocaleString('sl-SI') });
  saveData();
  closeModal();
  toast('Vrnjeno: ' + q + ' × ' + item.name + ' (' + who + ')');
  refreshCurrent(item.id);
}
/* vrne vse predmete iste skupinske izposoje naenkrat; zapisi delijo isto
   oznako skupine, zato so v dnevniku prikazani kot eno vračilo */
function returnGroup(gid){
  const sib = loansByGid(gid);
  if(!sib.length){ toast('Ta skupina nima odprtih izposoj.'); return; }
  if(!sib.some(s=>canReturn(s.loan))){ toast('To skupino lahko vrne le izposojevalec ali gospodar opreme.'); return; }
  const rgid = 'R' + Date.now();
  const time = new Date().toLocaleString('sl-SI');
  for(const { item, loan } of sib){
    log.unshift({ type:'return', code:item.id, name:item.name, borrower:loan.borrower, email:loan.email, borrowerId:loan.borrowerId, qty:loan.qty, time, gid:rgid });
  }
  for(const it of inventory) it.loans = it.loans.filter(l=>l.gid !== gid);
  const n = new Set(sib.map(s=>s.item.id)).size;
  saveData();
  closeModal();
  toast('Vrnjeno: ' + n + ' predmetov (' + esc(sib[0].loan.borrower) + ')');
  refreshCurrent();
}
/* vračilo skupinske izposoje, kjer izbereš katere predmete vrneš (celotno ali

          '</span>'

    '<button class="btn btn-accent btn-sm" data-act="returnGroup" data-gid="' + esc(gid) + '">↩ Vrni celotno skupino</button>' +

/* vrne en izbran predmet iz skupinske izposoje (celoto ali del); indeks i kaže
   na par v loansByGid(gid), enako kot v openGroupReturnModal */
function returnGroupItem(gid, i){
  const sib = loansByGid(gid);
  const pair = sib[i];
  if(!pair){ toast('Te izposoje ni mogoče najti.'); return; }
  const { item, loan } = pair;
  if(!canReturn(loan)){ toast('To opremo lahko vrne le izposojevalec ali gospodar opreme.'); return; }
  const inp = el('grq'+i);
  const q = parseInt(inp ? inp.value : '', 10);
  if(!q || q<1 || q>loan.qty){ toast('Količina mora biti med 1 in ' + loan.qty + '.'); return; }
  const idx = item.loans.indexOf(loan);
  loan.qty -= q;
  const who = loan.borrower;
  if(loan.qty===0) item.loans.splice(idx, 1);
  log.unshift({ type:'return', code:item.id, name:item.name, borrower:who, email:loan.email, borrowerId:loan.borrowerId, qty:q, time:new Date().toLocaleString('sl-SI') });
  saveData();
  closeModal();
  toast('Vrnjeno: ' + q + ' × ' + item.name + ' (' + who + ')');
  refreshCurrent(item.id);
}

        '<div class="field"><label>Izposoja se na</label>' +
          (isAdmin()
            ? '<select id="cWho">' + userOptions(currentUser?currentUser.id:'') + '</select>'
            : '<div class="whobox">' + whoUserHTML(currentUser) + '</div>') + '</div>' +
        '<div class="field"><label>Vrni do</label><input id="cUntil" type="date" value="' + plusDaysISO(14) + '">' +
          '<div class="duechips">' +
            '<button type="button" class="chip chip-sm" data-act="cartDue" data-days="7">+7 dni</button>' +
            '<button type="button" class="chip chip-sm" data-act="cartDue" data-days="14">+14 dni</button>' +
            '<button type="button" class="chip chip-sm" data-act="cartDue" data-days="30">+30 dni</button>' +
          '</div></div>' +
        '<div class="field"><label>Opomba (neobvezno)</label><input id="cNote"></div>' +
        '<button class="btn btn-accent btn-block" data-act="cartSubmit">↗ Izposodi vse izbrane predmete</button>' +
      '</div>' +
    '</div>';
  renderCartFilters();
  renderCartResults();
  renderCartBasket();
}
/* filtri po kategoriji in podkategoriji v pogledu Izposoja; štejejo se le
   razpoložljivi predmeti (availQty > 0). Posodablja samo svoj vsebnik, da ne
   ponastavi izbire uporabnika/roka na desni. */
function renderCartFilters(){
  const host = el('cartFilters');
  if(!host) return;
  const avail = inventory.filter(i => availQty(i) > 0);
  let h = '<div class="chips"><span class="chips-label">Kategorija</span>' +
    '<button class="chip chip-sm' + (!cartCat?' active':'') + '" data-act="cartCat">Vse' +
      '<span class="cnt">' + avail.length + '</span></button>';
  for(const c of categories){
    const cnt = avail.filter(i=>i.cat===c.id).length;
    if(!cnt) continue;
    h += '<button class="chip chip-sm' + (cartCat===c.id?' active':'') + '" data-act="cartCat" data-id="' + esc(c.id) + '">' +
      esc(c.icon) + ' ' + esc(c.name) + '<span class="cnt">' + cnt + '</span></button>';
  }
  h += '</div>';
  if(cartCat){
    const c = catById(cartCat);
    const subs = (c && Array.isArray(c.subcats)) ? c.subcats : [];
    const withItems = subs.filter(s => avail.some(i => i.cat===cartCat && i.subcat===s));
    if(withItems.length){
      h += '<div class="chips" style="margin-top:-4px"><span class="chips-label">Podkategorija</span>' +
        '<button class="chip chip-sm' + (!cartSub?' active':'') + '" data-act="cartSub">Vse</button>';
      for(const s of withItems){
        const cnt = avail.filter(i => i.cat===cartCat && i.subcat===s).length;
        h += '<button class="chip chip-sm' + (cartSub===s?' active':'') + '" data-act="cartSub" data-sub="' + esc(s) + '">' +
          esc(s) + '<span class="cnt">' + cnt + '</span></button>';
      }
      h += '</div>';
    }
  }
  host.innerHTML = h;
}
function renderCartResults(){
  const host = el('cartResults');
  if(!host) return;
  const q = cartQ.trim().toLowerCase();
  const avail = inventory.filter(i => availQty(i) > 0 &&
    (!cartCat || i.cat === cartCat) &&
    (!cartSub || i.subcat === cartSub) &&
    (!q || i.name.toLowerCase().includes(q) || String(i.id).toLowerCase().includes(q)));
  if(!avail.length){
    host.innerHTML = '<div class="empty">' + (q || cartCat ? 'Noben razpoložljiv predmet ne ustreza filtru.' : 'Trenutno ni razpoložljivih predmetov.') + '</div>';
    return;
  }
  let h = '';
  for(const i of avail.slice(0, 80)){
    const inB = !!cartLine(i.id);
    const cat = catById(i.cat);
    h += '<div class="cart-pickrow' + (inB?' inbasket':'') + '">' +
      '<span class="nm"><span class="tag">' + esc(i.id) + '</span> ' + esc(i.name) +
        (cat?' <small style="color:var(--ink-soft)">· ' + esc(cat.name) + '</small>':'') + '</span>' +
      '<span class="av">' + availQty(i) + ' na voljo</span>' +
      (inB
        ? '<button class="btn btn-ghost btn-sm" disabled>V košarici</button>'
        : '<button class="btn btn-primary btn-sm" data-act="cartAdd" data-code="' + esc(i.id) + '">+ Dodaj</button>') +
    '</div>';
  }
  host.innerHTML = h;
}
function renderCartBasket(){
  const host = el('cartBasket');
  if(!host) return;
  if(!cart.length){
    host.innerHTML = '<div class="cart-basket"><div class="cart-sum">Nimaš izbranih predmetov. Dodaj predmete z leve strani.</div></div>';
    if(activeNav==='cart') buildSidebar();
    return;
  }
  let h = '<div class="cart-basket">';
  for(const c of cart){
    const item = itemByCode(c.code);
    if(!item) continue;
    const mx = availQty(item);
    h += '<div class="cart-row">' +
      '<span class="nm"><span class="tag">' + esc(item.id) + '</span> ' + esc(item.name) +
        '<small>' + mx + ' na voljo</small></span>' +
      '<span class="qtystep">' +
        '<button type="button" data-act="cartStep" data-code="' + esc(item.id) + '" data-d="-1" aria-label="Manj">−</button>' +
        '<input type="number" min="1" max="' + mx + '" value="' + c.qty + '" data-input="cartQty" data-code="' + esc(item.id) + '">' +
        '<button type="button" data-act="cartStep" data-code="' + esc(item.id) + '" data-d="1" aria-label="Več">+</button>' +
      '</span>' +
      '<button class="rm" data-act="cartRemove" data-code="' + esc(item.id) + '" aria-label="Odstrani">×</button>' +
    '</div>';
  }
  h += '<div class="cart-sum">Skupaj: ' + cart.length + ' predmetov, ' + cartItemCount() + ' kosov</div></div>';
  host.innerHTML = h;
  if(activeNav==='cart') buildSidebar();
}
function cartAdd(code){
  const item = itemByCode(code);
  if(!item){ toast('Predmet ne obstaja.'); return; }
  if(availQty(item) <= 0){ toast('Ni razpoložljivih kosov.'); return; }
  if(cartLine(code)){ return; }
  cart.push({ code:item.id, qty:1 });
  renderCartBasket();
  renderCartResults();
}
function cartRemove(code){
  cart = cart.filter(c=>c.code!==code);
  renderCartBasket();
  renderCartResults();
}
function cartStep(code, d){
  const c = cartLine(code), item = itemByCode(code);
  if(!c || !item) return;
  c.qty = Math.max(1, Math.min(availQty(item), c.qty + d));
  renderCartBasket();
}
function cartSetQty(code, val){           // ob tipkanju posodobi stanje brez ponovnega izrisa (fokus ostane)
  const c = cartLine(code), item = itemByCode(code);
  if(!c || !item) return;
  let v = parseInt(val, 10);
  if(isNaN(v)) return;
  c.qty = Math.max(1, Math.min(availQty(item), v));
}
function submitCartLoan(){
  if(!cart.length){ toast('Nimaš ibranih predmetov.'); return; }
  if(!currentUser){ toast('Najprej se prijavi.'); return; }
  let u = currentUser;
  if(isAdmin() && el('cWho')){
    u = userById(el('cWho').value);
    if(!u){ toast('Izberi uporabnika.'); el('cWho').focus(); return; }
  }
  const until = el('cUntil').value;
  const note = el('cNote').value.trim();
  if(!until){ toast('Izberi datum vračila.'); return; }
  /* preveri razpoložljivost vseh predmetov pred zapisom */
  for(const c of cart){
    const item = itemByCode(c.code);
    if(!item){ toast('Predmet ' + c.code + ' ne obstaja več.'); return; }
    if(c.qty < 1 || c.qty > availQty(item)){
      toast('Za ' + item.name + ' je na voljo le ' + availQty(item) + ' kosov.'); return;
    }
  }
  /* potrditveno okno: vprašaj, ali je to vse, preden zaključimo izposojo */
  const pieces = cart.reduce((s,c)=>s+c.qty, 0);
  confirmDialog(
    'Ali je to vse, kar si želiš izposoditi? V košarici je ' + cart.length + ' predmetov (' + pieces + ' kosov). Po potrditvi se vse zabeleži kot ena izposoja.',
    ()=>finalizeCartLoan(u, until, note),
    'Da, izposodi'
  );
}
function finalizeCartLoan(u, until, note){
  if(!cart.length){ toast('Košarica je prazna.'); return; }
  /* znova preveri razpoložljivost — stanje se je med potrjevanjem morda spremenilo */
  for(const c of cart){
    const item = itemByCode(c.code);
    if(!item){ toast('Predmet ' + c.code + ' ne obstaja več.'); return; }
    if(c.qty < 1 || c.qty > availQty(item)){
      toast('Za ' + item.name + ' je na voljo le ' + availQty(item) + ' kosov.'); return;
    }
  }
  const who = userDisplay(u);
  const gid = 'L' + Date.now();
  const time = new Date().toLocaleString('sl-SI');
  for(const c of cart){
    const item = itemByCode(c.code);
    item.loans.push({ borrower:who, email:u.email, borrowerId:u.id, qty:c.qty, from:todayISO(), until, note, gid });
    log.unshift({ type:'borrow', code:item.id, name:item.name, borrower:who, email:u.email, borrowerId:u.id, qty:c.qty, until, time, gid });
  }
  const n = cart.length;
  cart = [];
  cartQ = '';
  saveData();
  toast('Izposojeno: ' + n + ' predmetov → ' + who);
  switchView('cart');
}

   10. PREDMETI — dodajanje, urejanje, brisanje (admin)
===================================================================== */
/* ---------- PDF dokumenti predmeta (Supabase Storage) ----------
   PDF se nalozijo v javni bucket; v predmetu hranimo le { name, path }.
   Pot je nakljucna (UUID), zato javne povezave ni mogoce uganiti.
   Brisanje iz shrambe se izvede sele ob shranjevanju predmeta, da
   preklic urejanja ne pusti predmeta s pokvarjeno povezavo. */
const FILES_BUCKET = 'item-files';
const FILE_MAX = 20 * 1024 * 1024;       // 20 MB na datoteko
let editFiles = [];                      // dokumenti v odprtem urejevalniku
let editFilesOrig = [];                  // poti dokumentov ob odprtju (za brisanje ob shranjevanju)
let editFilesBusy = false;
function fileUid(){
  return (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
       : 'f' + Date.now() + Math.random().toString(36).slice(2);
}
function fileUrl(path){
  if(!sb) return '#';
  const { data } = sb.storage.from(FILES_BUCKET).getPublicUrl(path);
  return (data && data.publicUrl) ? data.publicUrl : '#';
}
async function uploadItemFile(file){
  const safe = file.name.replace(/[^\w.\-]+/g, '_').slice(-80) || 'dokument.pdf';
  const path = fileUid() + '/' + safe;
  const { error } = await sb.storage.from(FILES_BUCKET)
    .upload(path, file, { contentType: file.type || 'application/pdf', upsert:false });
  if(error) throw error;
  return { name: file.name, path };
}
function filesSectionHTML(){
  return '<div class="field"><label>Dokumenti (PDF)</label>' +
    '<div id="iFilesList"></div>' +
    '<input type="file" id="iFileInput" accept="application/pdf,.pdf" multiple style="display:none" data-change="itemFilePick">' +
    '<button type="button" class="btn btn-ghost btn-sm" id="iFileAddBtn" data-act="itemFileAdd">+ Dodaj PDF</button>' +
    '</div>';
}
function renderEditFilesList(){
  const host = el('iFilesList');
  if(!host) return;
  host.innerHTML = editFiles.length
    ? editFiles.map((f,i)=>
        '<div style="display:flex;align-items:center;gap:8px;margin:4px 0">' +
          '<a href="' + esc(fileUrl(f.path)) + '" target="_blank" rel="noopener" style="flex:1;color:var(--ember);font-weight:600">📄 ' + esc(f.name) + '</a>' +
          '<button type="button" class="btn btn-danger btn-sm" data-act="itemFileRemove" data-idx="' + i + '"' + (editFilesBusy?' disabled':'') + '>✕</button>' +
        '</div>').join('')
    : '<div class="sub" style="margin:0 0 6px">Ni priloženih dokumentov.</div>';
  const btn = el('iFileAddBtn');
  if(btn){ btn.disabled = editFilesBusy; btn.textContent = editFilesBusy ? 'Nalagam …' : '+ Dodaj PDF'; }
}
async function onItemFilePick(input){
  const files = Array.from(input.files || []);
  input.value = '';                        // omogoci ponovno izbiro iste datoteke
  if(!files.length) return;
  if(!sb){ toast('Supabase ni na voljo.'); return; }
  editFilesBusy = true; renderEditFilesList();
  for(const file of files){
    if(file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)){ toast('Dovoljeni so samo PDF dokumenti: ' + file.name); continue; }
    if(file.size > FILE_MAX){ toast('Datoteka je prevelika (najvec 20 MB): ' + file.name); continue; }
    try{ editFiles.push(await uploadItemFile(file)); }
    catch(e){ console.error(e); toast('Nalaganje ni uspelo: ' + file.name + (e && e.message ? ' (' + e.message + ')' : '')); }
  }
  editFilesBusy = false; renderEditFilesList();
}
function removeEditFile(idx){
  if(editFilesBusy) return;               // referenco le odstranimo; iz shrambe brisemo sele ob shranjevanju
  if(editFiles[idx]) editFiles.splice(idx, 1);
  renderEditFilesList();
}
/* iz shrambe odstrani dokumente, ki so bili ob odprtju, zdaj pa jih ni vec */
function purgeRemovedFiles(){
  const keep = new Set(editFiles.map(f=>f.path));
  const gone = editFilesOrig.filter(p => !keep.has(p));
  if(gone.length && sb) sb.storage.from(FILES_BUCKET).remove(gone).catch(e=>console.error(e));
}
function openItemModal(id, presetCat, presetSub){
  if(!isAdmin()) return;
  const item = id ? itemByCode(id) : null;
  const cat = item ? item.cat : (presetCat || (categories[0] && categories[0].id) || '');
  const catOpts = categories.map(c =>
    '<option value="' + esc(c.id) + '"' + (c.id===cat?' selected':'') + '>' + esc(c.icon) + ' ' + esc(c.name) + '</option>').join('');
  openModal(
    '<h3>' + (item?'Uredi predmet':'Dodaj predmet') + '</h3>' +
    '<div class="fieldrow">' +
      '<div class="field"><label>Koda</label><input id="iCode" value="' + esc(item?item.id:'') + '" ' + (item?'disabled':'placeholder="npr. KUH-003"') + '></div>' +
      '<div class="field"><label>Količina</label><input id="iQty" type="number" min="1" value="' + (item?item.qty:1) + '"></div>' +
    '</div>' +
    '<div class="field"><label>Ime predmeta</label><input id="iName" value="' + esc(item?item.name:'') + '"></div>' +
    '<div class="fieldrow">' +
      '<div class="field"><label>Kategorija</label><select id="iCat" data-change="itemCat">' + catOpts + '</select></div>' +
      '<div class="field"><label>Podkategorija</label><select id="iSub"></select></div>' +
    '</div>' +
    '<div class="field"><label>Opomba</label><input id="iNote" value="' + esc(item?item.note:'') + '"></div>' +
    filesSectionHTML() +
    '<div class="actions">' +
      (item?'<button class="btn btn-danger" style="margin-right:auto" data-act="itemDel" data-id="' + esc(item.id) + '">Izbriši</button>':'') +
      '<button class="btn btn-ghost" data-act="modalClose">Prekliči</button>' +
      '<button class="btn btn-primary" data-act="itemSave"' + (item?' data-id="' + esc(item.id) + '"':'') + '>Shrani</button>' +
    '</div>');
  editFiles = item && Array.isArray(item.files) ? item.files.map(f=>({ name:f.name, path:f.path })) : [];
  editFilesOrig = editFiles.map(f=>f.path);
  editFilesBusy = false;
  fillSubcats(item ? item.subcat : presetSub);
  renderEditFilesList();
}
function fillSubcats(selected){
  const catSel = el('iCat');
  const subSel = el('iSub');
  if(!catSel || !subSel) return;
  const c = catById(catSel.value);
  subSel.innerHTML = (c?c.subcats:[]).map(s =>
    '<option' + (s===selected?' selected':'') + '>' + esc(s) + '</option>').join('');
}
function saveItem(id){
  const code = id || el('iCode').value.trim().toUpperCase();
  const name = el('iName').value.trim();
  const qty  = parseInt(el('iQty').value, 10);
  const cat  = el('iCat').value;
  const sub  = el('iSub').value;
  const note = el('iNote').value.trim();
  if(!code){ toast('Vpiši kodo predmeta.'); return; }
  if(!id && !/^[0-9A-ZČŠŽĐĆ._\/-]{1,32}$/.test(code)){
    toast('Koda lahko vsebuje le črke, številke in znake . _ - / (brez presledkov).'); return;
  }
  if(!name){ toast('Vpiši ime predmeta.'); return; }
  if(!qty || qty<1){ toast('Količina mora biti vsaj 1.'); return; }
  const files = editFiles.slice();
  if(id){
    const item = itemByCode(id);
    if(qty < borrowedQty(item)){ toast('Količina ne more biti manjša od trenutno izposojene (' + borrowedQty(item) + ').'); return; }
    Object.assign(item, { name, qty, cat, subcat:sub, note, files });
  } else {
    if(itemByCode(code)){ toast('Koda ' + code + ' že obstaja.'); return; }
    inventory.push({ id:code, name, cat, subcat:sub, qty, note, files, loans:[], custom:{} });
  }
  purgeRemovedFiles();
  saveData();
  closeModal();
  toast('Predmet shranjen.');
  refreshCurrent();
}
function deleteItem(id){
  const item = itemByCode(id);
  if(!item) return;
  if(borrowedQty(item)>0){ toast('Predmeta z odprtimi izposojami ni mogoče izbrisati.'); return; }
  confirmDialog('Predmet »' + item.name + '« (' + item.id + ') bo trajno izbrisan iz inventarja.', ()=>{
    const paths = (item.files||[]).map(f=>f.path);
    if(paths.length && sb) sb.storage.from(FILES_BUCKET).remove(paths).catch(e=>console.error(e));
    inventory = inventory.filter(i=>i.id!==item.id);
    saveData();
    closeModal();
    toast('Predmet izbrisan.');
    refreshCurrent();
  });
}
