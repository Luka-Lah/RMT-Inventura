function exportJSON(){
  const data = {
    app: 'RMT Inventura',
    version: 2,
    exported: new Date().toISOString(),
    categories, inventory, log, users
  };
  const json = JSON.stringify(data, null, 2);
  try{
    const blob = new Blob([json], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'RMT_inventura_kopija_' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    toast('Varnostna kopija prenesena.');
  }catch(e){
    console.error(e);
    toast('Prenos ni uspel.');
  }
}
function handleImportFile(input){
  const file = input.files && input.files[0];
  input.value = '';                       // omogoči ponovno izbiro iste datoteke
  if(!file) return;
  importJSONFile(file);
}
function importJSONFile(file){
  const reader = new FileReader();
  reader.onerror = ()=>toast('Datoteke ni bilo mogoče prebrati.');
  reader.onload = ()=>{
    let d;
    try{ d = JSON.parse(reader.result); }
    catch(e){ toast('To ni veljavna JSON datoteka.'); return; }
    if(!d || !Array.isArray(d.categories) || !Array.isArray(d.inventory)){
      toast('Datoteka ni varnostna kopija RMT Inventure (manjkajo kategorije ali inventar).');
      return;
    }
    if(d.inventory.some(i => !i || typeof i.id !== 'string' || typeof i.name !== 'string')){
      toast('Datoteka je poškodovana: predmeti nimajo kode ali imena.');
      return;
    }
    const newLog = Array.isArray(d.log) ? d.log : [];
    confirmDialog(
      'Trenutni podatki (' + inventory.length + ' predmetov, ' + categories.length + ' kategorij) bodo zamenjani s podatki iz kopije' +
      (d.exported ? ' z dne ' + fmtDate(String(d.exported).slice(0,10)) : '') +
      ' (' + d.inventory.length + ' predmetov, ' + d.categories.length + ' kategorij). Uporabniški računi ostanejo nespremenjeni.',
      ()=>{
        categories = d.categories;
        inventory  = d.inventory;
        log        = newLog;
        migrateData();                    // stare kopije s šotorskim zapisom se migrirajo
        saveData();
        switchView('backup');
        toast('Podatki obnovljeni iz varnostne kopije.');
      }, 'Obnovi');
  };
  reader.readAsText(file);
}

async function changeUserRole(id, role){
  const u = userById(id);
  if(!u) return;
  const newRole = role==='admin' ? 'admin' : 'user';
  if(u.role==='admin' && newRole==='user' && users.filter(x=>x.role==='admin').length<=1){
    toast('Vsaj en gospodar opreme mora ostati.'); switchView('users'); return;
  }
  const { error } = await sb.from('profiles').update({ role:newRole }).eq('id', id);
  if(error){ toast(sbErr(error, 'Spremembe vloge ni bilo mogoče shraniti.')); return; }
  await dbLoadUsers();
  toast('Vloga posodobljena.');
  switchView('users');
}
function deleteUser(id){
  const u = userById(id);
  if(!u) return;
  if(currentUser && u.id===currentUser.id){ toast('Sebe ne moreš odstraniti.'); return; }
  if(u.role==='admin' && users.filter(x=>x.role==='admin').length<=1){ toast('Vsaj en gospodar opreme mora ostati.'); return; }
  confirmDialog('Uporabnik »' + userDisplay(u) + '« (' + (u.email||'') + ') bo odstranjen iz aplikacije. Pretekle izposoje in dnevnik ostanejo zabeleženi. Prijavni račun se v celoti odstrani v Supabase nadzorni plošči.', async ()=>{
    const { error } = await sb.from('profiles').delete().eq('id', id);
    if(error){ toast(sbErr(error, 'Odstranitev ni uspela.')); return; }
    await dbLoadUsers();
    toast('Uporabnik odstranjen.');
    switchView('users');
  });
}

function fieldEditorHTML(){

/* razčleni trenutni vnos možnosti (med tipkanjem še neshranjen) */
function draftOpts(f){
  const raw = (f._opts !== undefined) ? f._opts : (f.options||[]).join('; ');
  return raw.split(';').map(s=>s.trim()).filter(Boolean);
}
/* vrstice z barvno paleto za vsako možnost spustnega seznama */
function colorRowsHTML(f, idx){
  const opts = draftOpts(f);
  if(!opts.length) return '';
  const cur = f._colors || f.colors || {};
  let h = '<div class="copt-lbl">Barve možnosti (neobvezno)</div>';
  for(const o of opts){
    h += '<div class="copt"><span class="copt-name">' + esc(o) + '</span>' +
      '<button type="button" class="swatch swatch-none' + (!cur[o]?' sel':'') + '" data-act="fieldColor" data-idx="' + idx + '" data-opt="' + esc(o) + '" data-c="" title="Brez barve">∅</button>';
    for(const pc of OPT_COLORS){
      h += '<button type="button" class="swatch' + (cur[o]===pc.c?' sel':'') + '" style="background:' + pc.c + '"' +
        ' data-act="fieldColor" data-idx="' + idx + '" data-opt="' + esc(o) + '" data-c="' + pc.c + '" title="' + pc.n + '"></button>';
    }
    h += '</div>';
  }
  return h;
}
function renderFieldRows(){
  const host = el('fieldRows');
  if(!host) return;
  let h = '';
  draftFields.forEach((f, i)=>{
    const needOpts = (f.type==='select' || f.type==='multiselect');
    h += '<div class="frow">' +
      '<div class="frow-top">' +
        '<input type="text" class="frow-name" placeholder="Ime stolpca" value="' + esc(f.name) + '" data-input="fieldName" data-idx="' + i + '">' +
        '<select class="frow-type" data-change="fieldType" data-idx="' + i + '">' +
          FIELD_TYPES.map(t=>'<option value="' + t.id + '"' + (f.type===t.id?' selected':'') + '>' + t.label + '</option>').join('') +
        '</select>' +
        '<span class="frow-btns">' +
          '<button type="button" data-act="fieldUp" data-idx="' + i + '" title="Premakni gor" aria-label="Premakni gor"' + (i===0?' disabled':'') + '>↑</button>' +
          '<button type="button" data-act="fieldDown" data-idx="' + i + '" title="Premakni dol" aria-label="Premakni dol"' + (i===draftFields.length-1?' disabled':'') + '>↓</button>' +
          '<button type="button" class="frow-x" data-act="fieldDel" data-idx="' + i + '" aria-label="Odstrani stolpec">×</button>' +
        '</span>' +
      '</div>' +
      (needOpts ? '<input type="text" class="frow-opts" placeholder="Možnosti, ločene s ; (npr. OK; Poškodovano; Manjka)"' +
        ' value="' + esc((f._opts !== undefined) ? f._opts : (f.options||[]).join('; ')) + '" data-input="fieldOpts" data-change="fieldOpts" data-idx="' + i + '">' +
        colorRowsHTML(f, i) : '') +
      '</div>';
  });
  host.innerHTML = h || '<div class="sub" style="color:var(--ink-soft);font-size:12.5px;margin-bottom:8px">Ta kategorija še nima dodatnih stolpcev.</div>';
}
function setDraftColor(idx, opt, color){
  const f = draftFields[idx];
  if(!f) return;
  if(!f._colors) f._colors = Object.assign({}, f.colors || {});
  if(color) f._colors[opt] = color;
  else delete f._colors[opt];
  renderFieldRows();
}
function addDraftField(){
  draftFields.push({ id:'f_' + Date.now() + '_' + draftFields.length, name:'', type:'text', options:[], _opts:'', _colors:{} });
  renderFieldRows();
  const names = document.querySelectorAll('.frow-name');
  if(names.length) names[names.length-1].focus();
}
function removeDraftField(i){
  draftFields.splice(i, 1);
  renderFieldRows();
}
function moveDraftField(i, d){
  const j = i + d;
  if(j<0 || j>=draftFields.length) return;
  const t = draftFields[i]; draftFields[i] = draftFields[j]; draftFields[j] = t;
  renderFieldRows();
}
/* vrne urejen seznam stolpcev ali null ob napaki (s toastom) */
function collectDraftFields(){
  const out = [];
  for(const f of draftFields){
    const name = (f.name||'').trim();
    if(!name) continue;                   // prazne vrstice preskočimo
    const fld = { id:f.id, name, type:f.type };
    if(f.type==='select' || f.type==='multiselect'){
      const raw = (f._opts !== undefined) ? f._opts : (f.options||[]).join('; ');
      const opts = raw.split(';').map(s=>s.trim()).filter(Boolean);
      if(!opts.length){ toast('Stolpec »' + name + '« potrebuje vsaj eno možnost (loči jih s ; ).'); return null; }
      fld.options = opts;
      const src = (f._colors !== undefined) ? f._colors : (f.colors || {});
      const colors = {};                  // barve obdržimo le za možnosti, ki še obstajajo
      for(const o of opts) if(src[o]) colors[o] = src[o];
      fld.colors = colors;
    }
    out.push(fld);
  }
  return out;
}

function saveEditCategory(id){
  const c = catById(id);
  if(!c || !draftCat) return;
  const name = el('cName').value.trim();
  const icon = el('cIcon').value.trim() || c.icon;
  if(!name){ toast('Vpiši ime kategorije.'); return; }
  if(categories.some(x=>x.id!==id && x.name.toLowerCase()===name.toLowerCase())){ toast('Kategorija s tem imenom že obstaja.'); return; }
  /* sestavi nove podkategorije, preveri prazne in podvojene */
  const rows = draftCat.subs.map(s=>({ orig:s.orig, name:(s.name||'').trim() })).filter(s=>s.name);
  const lower = rows.map(s=>s.name.toLowerCase());
  if(new Set(lower).size !== lower.length){ toast('Podkategorije se ne smejo ponavljati.'); return; }
  /* odstranjene podkategorije z obstoječimi predmeti niso dovoljene */
  const removed = (c.subcats||[]).filter(orig => !rows.some(r=>r.orig===orig));
  for(const r of removed){
    const cnt = inventory.filter(i=>i.cat===id && i.subcat===r).length;
    if(cnt>0){ toast('Podkategorija »' + r + '« vsebuje ' + cnt + ' predmetov in je ni mogoče odstraniti.'); return; }
  }
  /* preimenovanja prenesi na predmete */
  for(const r of rows){
    if(r.orig && r.orig !== r.name){
      for(const i of inventory) if(i.cat===id && i.subcat===r.orig) i.subcat = r.name;
    }
  }
  c.name = name;
  c.icon = icon;
  c.subcats = rows.map(r=>r.name);
  draftCat = null;
  saveData();
  closeModal();
  toast('Kategorija shranjena.');
  switchView('cats');
}

===================================================================== */
function openModal(html){
  el('modalBox').innerHTML = html;
  el('modalWrap').classList.add('on');
}
function closeModal(){
  el('modalWrap').classList.remove('on');
  el('modalBox').innerHTML = '';
}
/* lepo potrditveno okno; besedilo gre prek textContent (varno pred XSS) */
function confirmDialog(msg, cb, btnLabel){
  el('confirmMsg').textContent = msg;
  el('confirmBtn').textContent = btnLabel || 'Izbriši';
  confirmCb = cb;
  el('confirmWrap').classList.add('on');
}
function closeConfirm(){
  el('confirmWrap').classList.remove('on');
  confirmCb = null;
}
function confirmYes(){
  const cb = confirmCb;
  closeConfirm();
  if(cb) cb();
}
let toastTimer = null;
function toast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('on'), 2600);
}

===================================================================== */
const ACTIONS = {

  sort:       b=>{ const k=b.dataset.key;

  showOverdue:()=>{ allFilter = { cat:null, status:'overdue', q:'' }; switchView('all'); },
  /* predmeti */
  itemNew:    b=>openItemModal(null, b.dataset.cat, b.dataset.sub),
  itemEdit:   b=>openItemModal(b.dataset.id),
  itemSave:   b=>saveItem(b.dataset.id || null),
  itemDel:    b=>deleteItem(b.dataset.id),
  /* izposoja in vračilo */
  borrow:     b=>openBorrowModal(b.dataset.id),
  borrowSave: b=>submitBorrow(b.dataset.id),
  qtyStep:    b=>{ const i = el(b.dataset.target); if(!i) return;
                   const min = parseInt(i.min||'1',10), max = parseInt(i.max||'9999',10);
                   const v = (parseInt(i.value,10)||min) + parseInt(b.dataset.d,10);
                   i.value = Math.max(min, Math.min(max, v)); },
  due:        b=>{ const i = el('bUntil'); if(i) i.value = plusDaysISO(parseInt(b.dataset.days,10)); },
  return:     b=>openReturnModal(b.dataset.id),

  cartAdd:    b=>cartAdd(b.dataset.code),
  cartRemove: b=>cartRemove(b.dataset.code),
  cartStep:   b=>cartStep(b.dataset.code, parseInt(b.dataset.d,10)),
  cartDue:    b=>{ const i = el('cUntil'); if(i) i.value = plusDaysISO(parseInt(b.dataset.days,10)); },
  cartSubmit: ()=>submitCartLoan(),
  /* večizbirni stolpci */
  multiField: b=>openMultiField(b.dataset.id, b.dataset.fid),
  multiSave:  b=>saveMultiField(b.dataset.id, b.dataset.fid),
  /* koledar */
  calToggle:  ()=>toggleCalPop(),
  calClose:   ()=>closeCalPop(),
  calShift:   b=>calShift(parseInt(b.dataset.d,10)),
  calToday:   ()=>calToday(),
  calDay:     b=>selectCalDay(b.dataset.iso),
  calDayClose:()=>selectCalDay(null),
  calItem:    b=>{ closeCalPop(); showItemDetail(b.dataset.id); },
  /* QR, Excel, kopija, dnevnik */
  qrAll:      b=>qrSelectAll(b.dataset.on==='1'),
  qrPrint:    ()=>printLabels(),
  excel:      ()=>exportExcel(),
  backupExport: ()=>exportJSON(),
  backupPick: ()=>{ const f = el('importFile'); if(f) f.click(); },
  logClear:   ()=>clearLog(),
  /* kategorije in stolpci */
  catNew:        ()=>addCategory(),
  catSubmit:     ()=>submitCategory(),
  catEdit:       b=>openEditCategory(b.dataset.id),
  catEditSave:   b=>saveEditCategory(b.dataset.id),
  ceSubAdd:      ()=>addEditSub(),
  ceSubDel:      b=>removeEditSub(parseInt(b.dataset.idx,10)),
  catRename:     b=>openRenameCategory(b.dataset.id),
  catRenameSave: b=>saveRenameCategory(b.dataset.id),
  catFields:     b=>editCategoryFields(b.dataset.id),
  catFieldsSave: b=>saveCategoryFields(b.dataset.id),
  subAdd:        b=>addSubcat(b.dataset.id),
  subSubmit:     b=>submitSubcat(b.dataset.id),
  subRename:     b=>openRenameSubcat(b.dataset.id, b.dataset.sub),
  subRenameSave: b=>saveRenameSubcat(b.dataset.id, b.dataset.sub),
  subDel:        b=>deleteSubcat(b.dataset.id, b.dataset.sub),
  catDel:        b=>deleteCategory(b.dataset.id),
  emoji:         b=>setCatIcon(b.dataset.e),
  fieldAdd:      ()=>addDraftField(),
  fieldUp:       b=>moveDraftField(parseInt(b.dataset.idx,10), -1),
  fieldDown:     b=>moveDraftField(parseInt(b.dataset.idx,10), 1),
  fieldDel:      b=>removeDraftField(parseInt(b.dataset.idx,10)),
  fieldColor:    b=>setDraftColor(parseInt(b.dataset.idx,10), b.dataset.opt, b.dataset.c),
  /* okna */
  modalClose: ()=>closeModal(),
  modalBg:    (b,e)=>{ if(e.target===el('modalWrap')) closeModal(); },
  confirmNo:  ()=>closeConfirm(),
  confirmBg:  (b,e)=>{ if(e.target===el('confirmWrap')) closeConfirm(); },
  confirmYes: ()=>confirmYes()
};

document.addEventListener('click', e=>{
  const b = e.target.closest('[data-act]');
  if(b){
    const fn = ACTIONS[b.dataset.act];
    if(fn){ fn(b, e); }
    return;
  }
  /* klik na vrstico tabele odpre kartico predmeta */
  const row = e.target.closest('tr.rowlink');
  if(row && !e.target.closest('button,input,select,a,label')){
    showItemDetail(row.dataset.id);
    return;
  }
  /* klik izven koledarja ga zapre */
  const pop = el('calPop');
  if(pop && pop.classList.contains('on') && !e.target.closest('#calPop') && !e.target.closest('#calFab')){
    closeCalPop();
  }
});

const CHANGES = {
  customChk:  t=>setCustom(t.dataset.id, t.dataset.fid, t.checked),
  customSel:  t=>{
    setCustom(t.dataset.id, t.dataset.fid, t.value);
    const item = itemByCode(t.dataset.id);             // izbirnik takoj obarvamo po novi vrednosti
    const f = item ? catFields(item.cat).find(x=>x.id===t.dataset.fid) : null;
    const c = f ? optColor(f, t.value) : null;
    t.style.color = c || ''; t.style.borderColor = c || ''; t.style.fontWeight = c ? '700' : '';
  },
  customTxt:  t=>setCustom(t.dataset.id, t.dataset.fid, t.value.trim()),
  customDate: t=>{                       // ročni vpis datuma z normalizacijo
    const raw = t.value.trim();
    if(!raw){ setCustom(t.dataset.id, t.dataset.fid, ''); return; }
    const iso = parseDateInput(raw);
    if(!iso){
      toast('Neveljaven datum. Primeri: 15. 6. 2026, 15.6.26, 2026-06-15');
      const item = itemByCode(t.dataset.id);
      t.value = fmtDateInput(item && item.custom ? (item.custom[t.dataset.fid]||'') : '');
      return;
    }
    setCustom(t.dataset.id, t.dataset.fid, iso);
    t.value = fmtDateInput(iso);
  },
  multiChk:   t=>multiExclusive(t),
  itemCat:    t=>fillSubcats(),
  fieldType:  t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f){ f.type = t.value; renderFieldRows(); } },
  fieldOpts:  t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f){ f._opts = t.value; renderFieldRows(); } },
  calMonth:   t=>{ calM = parseInt(t.value,10); calSelDay = null; renderCalPop(); },
  calYear:    t=>{ calY = parseInt(t.value,10); calSelDay = null; renderCalPop(); },
  logType:    t=>{ logFilter.type = t.value; updateLogTable(); },
  userRole:   t=>changeUserRole(t.dataset.id, t.value),
  importFile: t=>handleImportFile(t)
};
document.addEventListener('change', e=>{
  const t = e.target.closest('[data-change]');
  if(!t) return;
  const fn = CHANGES[t.dataset.change];
  if(fn) fn(t);
});

const INPUTS = {
  globalSearch: t=>globalSearch(t.value),
  browseSearch: t=>{ browseState.q = t.value; updateBrowseTable(); },
  allSearch:    t=>{ allFilter.q = t.value; updateAllTable(); },
  logSearch:    t=>{ logFilter.q = t.value; updateLogTable(); },
  cartSearch:   t=>{ cartQ = t.value; renderCartResults(); },
  cartQty:      t=>cartSetQty(t.dataset.code, t.value),
  ceSubName:    t=>{ if(draftCat){ const s = draftCat.subs[parseInt(t.dataset.idx,10)]; if(s) s.name = t.value; } },
  fieldName:    t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f) f.name = t.value; },
  fieldOpts:    t=>{ const f = draftFields[parseInt(t.dataset.idx,10)]; if(f) f._opts = t.value; }
};
document.addEventListener('input', e=>{
  const t = e.target.closest('[data-input]');
  if(!t) return;
  const fn = INPUTS[t.dataset.input];
  if(fn) fn(t);
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(el('confirmWrap').classList.contains('on'))      closeConfirm();
    else if(el('modalWrap').classList.contains('on'))   closeModal();
    else if(el('calPop').classList.contains('on'))      closeCalPop();
    return;
  }
  if(e.key==='Enter'){
    if(e.target.id==='loginUser'){ el('loginPass').focus(); return; }
    if(e.target.id==='loginPass'){ doLogin(); return; }
    if(e.target.id==='regPass'){ doRegister(); return; }
    if(e.target.id==='sName'){      // Enter v oknu podkategorije potrdi vnos
      const btn = el('modalBox').querySelector('[data-act="subSubmit"],[data-act="subRenameSave"]');
      if(btn) btn.click();
    }
  }
});

   16. ZAGON APLIKACIJE
===================================================================== */
(async function init(){
  if(!sb){ el('loginErr').textContent = 'Strežnik Supabase ni dosegljiv (preveri URL in ključ).'; return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    try{ await afterAuth(); return; }
    catch(e){ console.error(e); }
  }
  el('loginUser').focus();
})();
</script>
